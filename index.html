function FunilPanel({ model, showRanking = false }) {
  // Filtro de período: mês atual / mês específico / intervalo / todas
  // Padrão ao logar: Mês atual (em iBridge, Auditadas e Creditadas).
  const [periodo, setPeriodo] = useState("atual");
  const [mesSel, setMesSel] = useState(mesAtualISO());
  const [de, setDe] = useState(""); const [ate, setAte] = useState("");

  const meses = useMemo(() => {
    const s = new Set(model.enriched.map((v) => v.mesISO).filter(Boolean));
    return [...s].sort().reverse();
  }, [model]);

  const noPeriodo = (v) => {
    if (periodo === "todas") return true;
    if (!v.dataISO) return false;
    if (periodo === "atual") return v.mesISO === mesAtualISO();
    if (periodo === "mes") return v.mesISO === mesSel;
    if (periodo === "intervalo") return (!de || v.dataISO >= de) && (!ate || v.dataISO <= ate);
    return true;
  };

  const rows = useMemo(() => model.enriched.filter(noPeriodo), [model, periodo, mesSel, de, ate]);
  const operadores = [...new Set(rows.map((v) => v.operador).filter(Boolean))].sort();

  // Desempenho por operador no MESMO recorte de período (taxa = aprovadas / vendas)
  const opsRank = useMemo(() => {
    const map = new Map();
    for (const r of rows) {
      if (!r.operador) continue;
      const o = map.get(r.operador) || { operador: r.operador, vendas: 0, aprovadas: 0, recusadas: 0, creditadas: 0 };
      o.vendas++;
      if (r.statusAud === "APROVADA") o.aprovadas++;
      else if (r.statusAud === "RECUSADA") o.recusadas++;
      if (r.statusCred === "CREDITADO") o.creditadas++;
      map.set(r.operador, o);
    }
    return [...map.values()].map((o) => ({ ...o, taxaAprov: o.vendas ? o.aprovadas / o.vendas : 0 })).sort((a, b) => b.vendas - a.vendas);
  }, [rows]);
  const maxVOp = opsRank.length ? opsRank[0].vendas : 1;
  const periodoLabel = periodo === "atual" ? "mês atual" : periodo === "mes" ? labelMes(mesSel) : periodo === "intervalo" ? "intervalo" : "todas as vendas";

  const k = useMemo(() => {
    const cpfs = new Set(rows.map((r) => r.cpf).filter(Boolean));
    return {
      fechamentos: rows.length,
      unicos: cpfs.size,
      novas: rows.filter((r) => r.recorrencia === "NOVA").length,
      recorrentes: rows.filter((r) => r.recorrencia === "RECORRENTE").length,
      aprovadas: rows.filter((r) => r.statusAud === "APROVADA").length,
      creditadas: rows.filter((r) => r.statusCred === "CREDITADO").length,
      semAud: rows.filter((r) => r.statusAud === "PENDENTE").length,
    };
  }, [rows]);
  const comissaoRecorte = rows.reduce((s, r) => s + (r.statusCred === "CREDITADO" ? (r.comissaoValor || 0) : 0), 0);

  const btn = (id, label) => (
    <button onClick={() => setPeriodo(id)} className="rounded-lg px-3 py-1.5 text-xs font-medium transition"
      style={periodo === id ? { background: BRAND.blue, color: "#fff" } : { background: "#EEF2F6", color: "#475569" }}>{label}</button>
  );

  return (
    <>
      {/* Barra de período */}
      <div className="mb-4 flex flex-wrap items-center gap-2 rounded-xl border border-slate-200 bg-white p-3">
        <span className="flex items-center gap-1.5 text-xs font-semibold text-slate-500"><Calendar size={14} /> Período:</span>
        {btn("atual", "Mês atual")}
        {btn("mes", "Mês específico")}
        {btn("intervalo", "Intervalo")}
        {btn("todas", "Todas as vendas")}
        {periodo === "mes" && (
          <select value={mesSel} onChange={(e) => setMesSel(e.target.value)} className="rounded-lg border border-slate-300 px-2 py-1.5 text-xs">
            {(meses.length ? meses : [mesAtualISO()]).map((m) => <option key={m} value={m}>{labelMes(m)}</option>)}
          </select>
        )}
        {periodo === "intervalo" && (
          <span className="flex items-center gap-1.5 text-xs text-slate-500">
            <input type="date" value={de} onChange={(e) => setDe(e.target.value)} className="rounded-lg border border-slate-300 px-2 py-1 text-xs" />
            até
            <input type="date" value={ate} onChange={(e) => setAte(e.target.value)} className="rounded-lg border border-slate-300 px-2 py-1 text-xs" />
          </span>
        )}
        <span className="ml-auto text-xs text-slate-400">{fmtInt(k.fechamentos)} fechamentos no recorte</span>
      </div>

      {/* Desempenho por operador (segue o período selecionado acima) */}
      {showRanking && opsRank.length > 0 && (
        <div className="mb-4 overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
          <div className="flex items-center justify-between border-b border-slate-100 px-4 py-2.5">
            <span className="text-sm font-semibold text-slate-700">Desempenho por operador <span className="text-xs font-normal text-slate-400">({periodoLabel})</span></span>
            <span className="text-xs text-slate-400">{fmtInt(opsRank.length)} operadores</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="border-b border-slate-100 bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-500">
                <th className="px-4 py-2.5">Operador</th><th className="px-4 py-2.5">Vendas</th><th className="px-4 py-2.5">Aprovadas</th><th className="px-4 py-2.5">Recusadas</th><th className="px-4 py-2.5">Taxa aprov.</th><th className="px-4 py-2.5">Creditadas</th>
              </tr></thead>
              <tbody>
                {opsRank.slice(0, 15).map((o, i) => (
                  <tr key={i} className="border-b border-slate-50 last:border-0">
                    <td className="px-4 py-2.5 font-medium text-slate-800">{o.operador}</td>
                    <td className="px-4 py-2.5">
                      <div className="flex items-center gap-2">
                        <div className="h-1.5 w-16 overflow-hidden rounded-full bg-slate-100"><div className="h-full rounded-full" style={{ width: `${(o.vendas / maxVOp) * 100}%`, background: BRAND.blue }} /></div>
                        {fmtInt(o.vendas)}
                      </div>
                    </td>
                    <td className="px-4 py-2.5 text-emerald-700">{fmtInt(o.aprovadas)}</td>
                    <td className="px-4 py-2.5 text-rose-600">{fmtInt(o.recusadas)}</td>
                    <td className="px-4 py-2.5">
                      <span className="rounded-full px-2 py-0.5 text-xs font-medium" style={{ background: o.taxaAprov >= 0.7 ? "#dcfce7" : o.taxaAprov >= 0.5 ? "#fef9c3" : "#fee2e2", color: o.taxaAprov >= 0.7 ? "#15803d" : o.taxaAprov >= 0.5 ? "#a16207" : "#b91c1c" }}>{fmtPct(o.taxaAprov)}</span>
                    </td>
                    <td className="px-4 py-2.5 font-medium" style={{ color: BRAND.blueDeep }}>{fmtInt(o.creditadas)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* KPIs do recorte */}
      <div className="mb-3 grid grid-cols-2 gap-3 sm:grid-cols-4">
        <Kpi icon={Phone} tone="sky" label="Fechamentos" value={fmtInt(k.fechamentos)} sub={`${fmtInt(k.unicos)} CPFs únicos`} />
        <Kpi icon={Plus} tone="blue" label="1ª venda" value={fmtInt(k.novas)} />
        <Kpi icon={Repeat} tone="violet" label="Recorrentes" value={fmtInt(k.recorrentes)} sub="após 1º crédito" />
        <Kpi icon={AlertTriangle} tone="amber" label="Sem auditoria" value={fmtInt(k.semAud)} />
      </div>
      <div className="mb-4 grid grid-cols-2 gap-3 sm:grid-cols-3">
        <Kpi icon={CheckCircle2} tone="emerald" label="Aprovadas" value={fmtInt(k.aprovadas)} />
        <Kpi icon={CreditCard} tone="emerald" label="Creditadas" value={fmtInt(k.creditadas)} />
        <Kpi icon={Coins} tone="teal" label="Comissão GT no recorte" value={fmtBRL(comissaoRecorte)} sub="conforme campanha vigente" />
      </div>

      <DataTable
        rows={rows}
        searchKeys={["nome", "cpf"]}
        filters={[
          { key: "recorrencia", label: "Tipo", options: ["NOVA", "RECORRENTE"] },
          { key: "statusAud", label: "Auditoria", options: ["APROVADA", "RECUSADA", "VERIFICAR", "PENDENTE"] },
          { key: "statusCred", label: "1º Crédito", options: ["CREDITADO", "NAO_EFETUADO", "CANCELADO", "EM_TRANSITO"] },
          { key: "operador", label: "Operador", options: operadores },
        ]}
        columns={[
          { key: "dataBR", title: "Data", render: (r) => <span>{r.dataBR} <span className="text-slate-400">{r.hora}</span></span> },
          { key: "nome", title: "Cliente", render: (r) => <span className="font-medium text-slate-800">{r.nome || "—"}</span> },
          { key: "cpf", title: "CPF", render: (r) => r.cpf || "—" },
          { key: "recorrencia", title: "Tipo", render: (r) => <RecBadge tipo={r.recorrencia} /> },
          { key: "operador", title: "Operador" },
          { key: "statusAud", title: "Auditoria", render: (r) => <Badge status={r.statusAud} /> },
          { key: "statusCred", title: "1º Crédito", render: (r) => r.statusCred ? <Badge status={r.statusCred} /> : <span className="text-slate-300">—</span> },
        ]}
      />
    </>
  );
}

    <>
      <PageHeader title="Vendas iBridge" desc="Etapa 1 do funil — fechamentos do call center. Os uploads se acumulam (sem duplicar) e você filtra por período." />
      <div className="mb-4">
        <UploadCard title="Planilha de vendas iBridge (panorama)" hint="Cada upload ACUMULA com os anteriores · Operação, Equipe, Operador, Data, Código (CPF), Contato… · .xlsx ou .csv"

      {ibridge.length === 0

/* ---------- Vendas Auditadas ---------- */
function AuditadasView({ model, auditoria, onUpload, onClear, loading }) {
  const motivosTop = useMemo(() => {
    const m = new Map();
    for (const a of auditoria) {
      if (a.status !== "RECUSADA" || !a.motivo) continue;
      const key = a.motivo.slice(0, 60);
      m.set(key, (m.get(key) || 0) + 1);
    }
    return [...m.entries()].sort((a, b) => b[1] - a[1]).slice(0, 6);
  }, [auditoria]);

  return (
    <>
      <PageHeader title="Vendas Auditadas" desc="Etapa 2 — conferência das ligações. O mesmo quadro do funil, agora com a coluna Auditoria classificada linha a linha." />
      <div className="mb-4">
        <UploadCard title="Planilha Auditoria GT 2" hint="Modelo: DATA, CPF, NOME, PARCEIRO, ELEGÍVEL (Sim/Não), OPERADOR, MOTIVO · .xlsx ou .csv"
          accept=".xlsx,.xls,.csv" onFile={onUpload} count={auditoria.length} onClear={onClear} loading={loading} />
      </div>

      {model.enriched.length === 0 ? (
        <EmptyState icon={ShieldCheck} title="Importe primeiro as Vendas iBridge" desc="O quadro do funil é montado a partir do iBridge. Depois, ao subir a Auditoria, a coluna Auditoria é classificada automaticamente." />
      ) : (
        <>
          {/* Alerta: vendas sem classificação */}
          {auditoria.length > 0 && model.ibSemAud.length > 0 && (
            <div className="mb-4 rounded-xl border border-amber-200 bg-amber-50 p-4">
              <div className="flex items-center gap-2 text-sm font-semibold text-amber-800">
                <AlertTriangle size={16} /> {fmtInt(model.ibSemAud.length)} vendas do iBridge ainda não foram auditadas — classificadas como “A verificar”.
              </div>
            </div>
          )}
          {model.audSemIb.length > 0 && (
            <p className="mb-3 text-xs text-slate-500">⚠ {fmtInt(model.audSemIb.length)} registros de auditoria não têm venda correspondente no iBridge (CPF não localizado na etapa 1).</p>
          )}

          <FunilPanel model={model} />

          {motivosTop.length > 0 && (
            <div className="mt-4 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
              <SectionTitle>Principais motivos de recusa</SectionTitle>
              <div className="space-y-2">
                {motivosTop.map(([motivo, n], i) => (
                  <div key={i} className="flex items-start justify-between gap-3 text-sm">
                    <span className="text-slate-600">{motivo}…</span>
                    <span className="shrink-0 rounded-full bg-rose-50 px-2 py-0.5 text-xs font-medium text-rose-700">{n}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </>
  );
}

/* ---------- Vendas Creditadas (histórico de quinzenas) ---------- */
function CreditadasView({ model, repasses, lerQuinzena, onAdd, onRemove, onClear, sessao, flash }) {
  const isAdmin = sessao.papel === "admin";
  const fileRef = useRef(null);
  const [busy, setBusy] = useState(false);
  const [form, setForm] = useState(null);   // { parsed, periodoIni, periodoFim, valorCreditado, dataPagamento, editId }
  const [confirmDel, setConfirmDel] = useState(null);

  const escolherArquivo = async (file) => {
    if (!file) return;
    setBusy(true);
    try {
      const { parsed, meta } = await lerQuinzena(file);
      const quit = parsed.clientes.filter((c) => c.retorno === "CREDITADO").length;
      const valorResumo = parsed.resumo.empresas.reduce((s, e) => s + (e.repasse || 0), 0);
      setForm({
        parsed,
        nomeArquivo: file.name,
        periodoIni: meta?.ini || "",
        periodoFim: meta?.fim || "",
        valorCreditado: meta?.valor ?? valorResumo ?? 0,
        dataPagamento: "",
        quit,
        editId: null,
      });
    } catch (e) {
      flash(e.message || "Falha ao ler a planilha.", false);
    } finally { setBusy(false); if (fileRef.current) fileRef.current.value = ""; }
  };

  const salvar = async () => {
    const fm = form;
    if (!fm.periodoIni || !fm.periodoFim) return flash("Informe o período (início e fim) da quinzena.", false);
    const id = fm.editId || `q_${fm.periodoIni}_${fm.periodoFim}`;
    const entry = {
      id, periodoIni: fm.periodoIni, periodoFim: fm.periodoFim,
      label: labelQuinzena(fm.periodoIni, fm.periodoFim),
      valorCreditado: Number(fm.valorCreditado) || 0,
      dataPagamento: fm.dataPagamento || "",
      clientes: fm.parsed.clientes, estornados: fm.parsed.estornados, resumo: fm.parsed.resumo,
      criadoEm: Date.now(),
    };
    await onAdd(entry); setForm(null);
  };

  const editarMeta = (q) => setForm({
    parsed: { clientes: q.clientes || [], estornados: q.estornados || [], resumo: q.resumo || { empresas: [] } },
    nomeArquivo: q.label, periodoIni: q.periodoIni, periodoFim: q.periodoFim,
    valorCreditado: q.valorCreditado, dataPagamento: q.dataPagamento || "",
    quit: (q.clientes || []).filter((c) => c.retorno === "CREDITADO").length, editId: q.id,
  });

  const hist = [...model.carteira].reverse(); // mais recente primeiro

  return (
    <>
      <PageHeader title="Vendas Creditadas" desc="Etapa 3 — a cada quinzena o parceiro envia a planilha de crédito. Suba planilha a planilha; o histórico (período, valor creditado e data de pagamento) fica salvo abaixo." />

      {/* Upload de quinzena */}
      <div className="mb-4 rounded-xl border-2 border-dashed border-slate-200 bg-white p-5">
        <div className="flex flex-wrap items-center justify-between gap-3">
          <div>
            <div className="flex items-center gap-2 text-sm font-semibold text-slate-800"><Upload size={16} style={{ color: BRAND.blue }} /> Subir planilha da quinzena</div>
            <p className="mt-1 text-xs text-slate-500">Aceita os dois formatos do parceiro (Clientes/Resumo/Estornados ou CRÉDITO/RESUMO). Ao subir, confirme período, valor creditado e data de pagamento.</p>
          </div>
          <div className="flex items-center gap-2">
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={(e) => escolherArquivo(e.target.files?.[0])} />
            <button onClick={() => fileRef.current?.click()} disabled={busy}
              className="flex items-center gap-1.5 rounded-lg px-4 py-2 text-sm font-semibold text-white disabled:opacity-60" style={{ background: BRAND.blue }}>
              <Upload size={15} /> {busy ? "Lendo…" : "Selecionar planilha"}
            </button>
            {repasses.length > 0 && isAdmin && (
              <button onClick={onClear} className="flex items-center gap-1.5 rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-500 hover:bg-slate-50"><Trash2 size={14} /> Limpar tudo</button>
            )}
          </div>
        </div>
      </div>

      {/* Histórico de quinzenas */}
      {repasses.length > 0 && (
        <>
          <div className="mb-4 grid grid-cols-2 gap-3 sm:grid-cols-4">
            <Kpi icon={Wallet} tone="emerald" label="Carteira total (repasse)" value={fmtBRL(model.carteiraTotal)} sub={`${fmtInt(model.carteira.length)} quinzenas`} />
            <Kpi icon={Users} tone="blue" label="Clientes na carteira" value={fmtInt(model.clientesCreditados)} sub="CPFs já creditados" />
            <Kpi icon={Repeat} tone="violet" label="Quitações no total" value={fmtInt(model.quitacoesTotal)} sub="1ª + recorrências" />
            <Kpi icon={Clock} tone="amber" label="A receber (sem data pgto.)" value={fmtBRL(model.aReceber)} />
          </div>

          <div className="mb-5 overflow-hidden rounded-xl border border-slate-200 bg-white">
            <div className="flex items-center justify-between border-b border-slate-100 px-4 py-2.5">
              <span className="text-sm font-semibold text-slate-700">Histórico de quinzenas</span>
              <span className="text-xs text-slate-400">{fmtInt(repasses.length)} períodos salvos</span>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="border-b border-slate-100 bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-500">
                  <th className="px-4 py-2.5">Quinzena</th><th className="px-4 py-2.5">Quitadas</th><th className="px-4 py-2.5">1ª venda</th><th className="px-4 py-2.5">Recorr.</th>
                  <th className="px-4 py-2.5">Valor creditado</th><th className="px-4 py-2.5">Pagamento</th><th className="px-4 py-2.5 text-right">Ações</th>
                </tr></thead>
                <tbody>
                  {hist.map((q) => (
                    <tr key={q.id} className="border-b border-slate-50 last:border-0">
                      <td className="px-4 py-2.5 font-medium text-slate-800">{q.label}</td>
                      <td className="px-4 py-2.5">{fmtInt(q.quitadas)}</td>
                      <td className="px-4 py-2.5"><span style={{ color: BRAND.blueDeep }}>{fmtInt(q.novas)}</span></td>
                      <td className="px-4 py-2.5"><span className="text-violet-700">{fmtInt(q.recorrentes)}</span></td>
                      <td className="px-4 py-2.5 font-medium text-emerald-700">{fmtBRL(q.valorCreditado)}</td>
                      <td className="px-4 py-2.5 text-slate-500">{q.dataPagamento ? brFromISO(q.dataPagamento) : <span className="text-amber-500">pendente</span>}</td>
                      <td className="px-4 py-2.5">
                        {isAdmin && (
                          <div className="flex items-center justify-end gap-1">
                            <button onClick={() => editarMeta(q)} title="Editar dados" className="grid h-8 w-8 place-items-center rounded-lg text-slate-500 hover:bg-slate-100"><Pencil size={14} /></button>
                            <button onClick={() => setConfirmDel(q)} title="Excluir quinzena" className="grid h-8 w-8 place-items-center rounded-lg text-rose-500 hover:bg-rose-50"><Trash2 size={14} /></button>
                          </div>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr className="border-t border-slate-200 bg-slate-50 font-semibold text-slate-700">
                    <td className="px-4 py-2.5">Total</td>
                    <td className="px-4 py-2.5">{fmtInt(model.carteira.reduce((s, q) => s + q.quitadas, 0))}</td>
                    <td className="px-4 py-2.5">{fmtInt(model.carteira.reduce((s, q) => s + q.novas, 0))}</td>
                    <td className="px-4 py-2.5">{fmtInt(model.carteira.reduce((s, q) => s + q.recorrentes, 0))}</td>
                    <td className="px-4 py-2.5 text-emerald-700">{fmtBRL(model.carteiraTotal)}</td>
                    <td className="px-4 py-2.5" colSpan={2}></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </>
      )}

      {/* Quadro do funil */}
      {model.enriched.length === 0 ? (
        <EmptyState icon={CreditCard} title={repasses.length ? "Suba o iBridge para cruzar o funil" : "Comece subindo as quinzenas de crédito"}
          desc="O quadro do funil é montado a partir do iBridge. Ao subir as quinzenas, a coluna 1º Crédito e o TIPO (1ª venda × recorrente) são classificados automaticamente." />
      ) : (
        <FunilPanel model={model} />
      )}

      {/* Modal de metadados da quinzena */}
      {form && (
        <div className="fixed inset-0 z-50 grid place-items-center bg-black/40 p-4" onClick={() => setForm(null)}>
          <div className="w-full max-w-md rounded-2xl bg-white p-5 shadow-xl" onClick={(e) => e.stopPropagation()}>
            <div className="mb-4 flex items-center justify-between">
              <h3 className="text-base font-semibold text-slate-800">{form.editId ? "Editar quinzena" : "Confirmar quinzena"}</h3>
              <button onClick={() => setForm(null)} className="text-slate-400 hover:text-slate-600"><X size={18} /></button>
            </div>
            <div className="mb-3 rounded-lg bg-slate-50 px-3 py-2 text-xs text-slate-600">
              <div className="truncate">{form.nomeArquivo}</div>
              <div className="mt-0.5 text-slate-400">{fmtInt(form.parsed.clientes.length)} registros · {fmtInt(form.quit)} quitados</div>
            </div>
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <Field label="Início da quinzena"><input type="date" value={form.periodoIni} onChange={(e) => setForm({ ...form, periodoIni: e.target.value })} className="inp" /></Field>
                <Field label="Fim da quinzena"><input type="date" value={form.periodoFim} onChange={(e) => setForm({ ...form, periodoFim: e.target.value })} className="inp" /></Field>
              </div>
              <Field label="Valor creditado (R$)"><input type="number" step="0.01" value={form.valorCreditado} onChange={(e) => setForm({ ...form, valorCreditado: parseFloat(e.target.value) || 0 })} className="inp" /></Field>
              <Field label="Data de pagamento para nós"><input type="date" value={form.dataPagamento} onChange={(e) => setForm({ ...form, dataPagamento: e.target.value })} className="inp" /></Field>
            </div>
            <div className="mt-4 flex justify-end gap-2">
              <button onClick={() => setForm(null)} className="rounded-lg px-4 py-2 text-sm text-slate-600 hover:bg-slate-100">Cancelar</button>
              <button onClick={salvar} className="flex items-center gap-1.5 rounded-lg px-4 py-2 text-sm font-semibold text-white" style={{ background: BRAND.blue }}><Check size={15} /> {form.editId ? "Salvar" : "Adicionar quinzena"}</button>
            </div>
          </div>
        </div>
      )}

      {confirmDel && (
        <div className="fixed inset-0 z-50 grid place-items-center bg-black/40 p-4" onClick={() => setConfirmDel(null)}>
          <div className="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-base font-semibold text-slate-800">Excluir quinzena</h3>
            <p className="mt-2 text-sm text-slate-600">Remover <b>{confirmDel.label}</b> do histórico?</p>
            <div className="mt-4 flex justify-end gap-2">
              <button onClick={() => setConfirmDel(null)} className="rounded-lg px-4 py-2 text-sm text-slate-600 hover:bg-slate-100">Cancelar</button>
              <button onClick={() => { onRemove(confirmDel.id); setConfirmDel(null); }} className="rounded-lg bg-rose-600 px-4 py-2 text-sm font-semibold text-white">Excluir</button>
            </div>
          </div>
        </div>
      )}
      <style>{`.inp{width:100%;border:1px solid #cbd5e1;border-radius:.5rem;padding:.5rem .75rem;font-size:.875rem;outline:none}.inp:focus{border-color:#94a3b8}`}</style>
    </>
  );
}

/* ---------- Projeção (próximas quinzenas de pagamento) ---------- */
function addDias(iso, n) { const d = new Date(iso + "T00:00:00"); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }
function ultimoDiaMes(y, m) { return new Date(y, m, 0).getDate(); } // m = 1..12
/* Gera as próximas N quinzenas a partir da última conhecida, com data de pagamento (25 da própria quinzena 01-15; 15 do mês seguinte para a 16-fim) */
function proximasQuinzenas(ultimaFimISO, n) {
  const out = [];
  let [y, m, d] = (ultimaFimISO || mesAtualISO() + "-15").split("-").map(Number);
  let segundaMetade = d >= 16; // se a última terminou no fim do mês, a próxima é 01-15 do mês seguinte
  for (let i = 0; i < n; i++) {
    if (segundaMetade) { m += 1; if (m > 12) { m = 1; y += 1; } } // próxima é 01-15
    const primeira = segundaMetade ? true : false; // alterna
    let ini, fim, pagamento;
    if (segundaMetade) {
      ini = `${y}-${String(m).padStart(2, "0")}-01`;
      fim = `${y}-${String(m).padStart(2, "0")}-15`;
      pagamento = `${y}-${String(m).padStart(2, "0")}-25`;
      segundaMetade = false;
    } else {
      const ld = ultimoDiaMes(y, m);
      ini = `${y}-${String(m).padStart(2, "0")}-16`;
      fim = `${y}-${String(m).padStart(2, "0")}-${ld}`;
      let pm = m + 1, py = y; if (pm > 12) { pm = 1; py += 1; }
      pagamento = `${py}-${String(pm).padStart(2, "0")}-15`;
      segundaMetade = true;
    }
    out.push({ ini, fim, pagamento, label: labelQuinzena(ini, fim) });
  }
  return out;
}

function ProjecaoView({ model, planoValor, comissaoPct, campanhas, metaMensal, setConfig }) {
  const A = model.analytics;
  const cart = model.carteira;
  const N_FUT = 6; // 6 quinzenas (3 meses) para enxergar a campanha maturar
  const [cenario, setCenario] = useState("realista");
  const [meta, setMeta] = useState(metaMensal || 1400);
  const [comCampanha, setComCampanha] = useState(true);

  const TAXAS = { conservador: 0.27, realista: 0.32, otimista: 0.38 };

  // Curva de maturação normalizada (fração do total de conversão em cada +k quinzenas)
  const curva = useMemo(() => {
    const c = A.curvaMaturacao && Object.keys(A.curvaMaturacao).length ? A.curvaMaturacao : { 1: 0.008, 2: 0.132, 3: 0.123, 4: 0.010 };
    const tot = Object.values(c).reduce((a, b) => a + b, 0) || 1;
    const norm = {}; for (const k in c) norm[k] = c[k] / tot;
    return norm; // soma 1
  }, [A]);

  const proj = useMemo(() => {
    if (!cart.length) return null;
    const conv = TAXAS[cenario];
    const ultima = cart[cart.length - 1];
    const futuras = proximasQuinzenas(ultima.periodoFim || ultima.periodoIni, N_FUT);
    const qIdx = A.qIdx;
    const primeiroFi = A.qIdx(futuras[0].fim);

    // Safras de venda: histórico recente ainda maturando + futuras pela meta
    const cohorts = [];
    // recentes já vendidas (últimos 3 meses do iBridge) — maturação restante
    for (const vm of A.vendasPorMes.slice(-3)) cohorts.push({ mes: vm.mes, vendas: vm.qtd });
    // futuras: do próximo mês em diante (4 meses), volume = meta
    let [y, m] = (A.vendasPorMes[A.vendasPorMes.length - 1]?.mes || mesAtualISO()).split("-").map(Number);
    for (let i = 0; i < 4; i++) { m += 1; if (m > 12) { m = 1; y += 1; } cohorts.push({ mes: `${y}-${String(m).padStart(2, "0")}`, vendas: meta, futura: true }); }

    let baseAtiva = model.clientesCreditados;
    // ÂNCORA: a recorrência parte do nível REAL da última quinzena (não recria de uma base pequena).
    // pRebill = recorrentes reais da última quinzena ÷ carteira ativa → a 1ª projetada bate com o realizado.
    const ultima2 = cart[cart.length - 1] || { recorrentes: 0 };
    const pRebill = baseAtiva ? Math.min(0.6, Math.max(0.05, ultima2.recorrentes / baseAtiva)) : 0.2;
    const retencaoNovas = 0.85; // % das novas creditadas que seguem ativas (engrossam a recorrência)
    const recorrUnit = planoValor * comissaoPct; // 30%

    const linhas = futuras.map((q) => {
      const fi = qIdx(q.fim);
      // novas creditadas nesta quinzena, somando todas as safras
      let novasCamp = 0, novas30 = 0;
      for (const co of cohorts) {
        const anchor = qIdx(co.mes + "-16"); // entrada concentrada na 2ª metade
        const k = fi - anchor;
        const frac = curva[k] || 0;
        if (frac <= 0) continue;
        const creditos = co.vendas * conv * frac;
        // campanha: venda (entrada) entre 01/06 e 31/12/2026 -> 1ª venda paga 50%
        const dentroCamp = comCampanha && campanhaDaData(campanhas, co.mes + "-16");
        if (dentroCamp) novasCamp += creditos; else novas30 += creditos;
      }
      const novas = novasCamp + novas30;
      const recorrentes = Math.round(baseAtiva * pRebill);
      const valNovas = novasCamp * planoValor * 0.50 + novas30 * planoValor * comissaoPct;
      const valNovas30 = novas * planoValor * comissaoPct; // cenário sem campanha
      const valRec = recorrentes * recorrUnit;
      const total = valNovas + valRec;
      const totalSemCamp = valNovas30 + valRec;
      baseAtiva += Math.round(novas * retencaoNovas); // novas creditadas engrossam a carteira viva
      return { ...q, novas: Math.round(novas), novasCamp: Math.round(novasCamp), recorrentes, valNovas, valRec, total, totalSemCamp };
    });
    const totalProj = linhas.reduce((s, l) => s + l.total, 0);
    const totalSemCamp = linhas.reduce((s, l) => s + l.totalSemCamp, 0);
    return { linhas, totalProj, totalSemCamp, recRate: pRebill, conv, baseInicial: model.clientesCreditados };
  }, [cart, model, planoValor, comissaoPct, campanhas, cenario, meta, comCampanha, curva, A]);

  const chartData = useMemo(() => {
    if (!proj) return [];
    const hist = cart.map((q) => ({ label: labelMes(mesDeISO(q.periodoFim || q.periodoIni)) + (String(q.periodoFim).endsWith("15") ? " Q1" : " Q2"), tipo: "Realizado", valor: q.valorCreditado }));
    const fut = proj.linhas.map((l) => ({ label: labelMes(mesDeISO(l.fim)) + (String(l.fim).endsWith("15") ? " Q1" : " Q2"), tipo: "Projetado", valor: comCampanha ? l.total : l.totalSemCamp }));
    return [...hist, ...fut];
  }, [cart, proj, comCampanha]);

  const salvarMeta = () => setConfig({ metaMensal: meta });

  const btnCen = (id, label, sub) => (
    <button onClick={() => setCenario(id)} className="flex-1 rounded-lg border px-3 py-2 text-left transition"
      style={cenario === id ? { borderColor: BRAND.blue, background: "#EAF3FA" } : { borderColor: "#e2e8f0", background: "#fff" }}>
      <div className="text-xs font-semibold" style={{ color: cenario === id ? BRAND.blueDeep : "#475569" }}>{label}</div>
      <div className="text-[11px] text-slate-400">{sub}</div>
    </button>
  );

  return (
    <>
      <PageHeader title="Projeção" desc="Modelo por safra: vendas do iBridge → aprovação na auditoria → crédito com defasagem real (~2 quinzenas). Pagamentos nos dias 15 e 25." />

      {!cart.length ? (
        <EmptyState icon={TrendingUp} title="Sem dados de crédito ainda" desc="Suba as quinzenas no menu Vendas Creditadas para projetar os próximos repasses." />
      ) : (
        <>
          {/* Premissas medidas dos dados */}
          <div className="mb-4 grid grid-cols-2 gap-3 lg:grid-cols-4">
            <Kpi icon={ShieldCheck} tone="emerald" label="Taxa de aprovação" value={fmtPct(A.taxaAprovacao)} sub="auditoria (real)" />
            <Kpi icon={Repeat} tone="violet" label="Retenção da carteira" value={fmtPct(A.retencaoMedia)} sub="recorrência por quinzena" />
            <Kpi icon={Clock} tone="sky" label="Defasagem venda→crédito" value="~2 quinzenas" sub="mediana 39 dias" />
            <Kpi icon={Users} tone="blue" label="Carteira recorrente" value={fmtInt(model.clientesCreditados)} sub="CPFs ativos hoje" />
          </div>

          {/* Controles */}
          <div className="mb-4 rounded-xl border border-slate-200 bg-white p-4">
            <div className="grid gap-4 lg:grid-cols-[1fr_auto_auto]">
              <div>
                <label className="mb-1.5 block text-xs font-medium text-slate-600">Cenário de conversão (entrada → crédito)</label>
                <div className="flex gap-2">
                  {btnCen("conservador", "Conservador", "27% da safra")}
                  {btnCen("realista", "Realista", "32% da safra")}
                  {btnCen("otimista", "Otimista", "38% da safra")}
                </div>
              </div>
              <div>
                <label className="mb-1.5 block text-xs font-medium text-slate-600">Meta de vendas/mês (iBridge)</label>
                <div className="flex items-center gap-2">
                  <input type="number" step="50" value={meta} onChange={(e) => setMeta(parseInt(e.target.value) || 0)}
                    className="w-28 rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-400" />
                  <button onClick={salvarMeta} className="rounded-lg px-3 py-2 text-xs font-semibold text-white" style={{ background: BRAND.blue }}>Salvar</button>
                </div>
                <div className="mt-1 text-[11px] text-slate-400">Tendência: {A.vendasPorMes.map((v) => v.qtd).join(" → ")}</div>
              </div>
              <div>
                <label className="mb-1.5 block text-xs font-medium text-slate-600">Campanha 50%</label>
                <button onClick={() => setComCampanha((s) => !s)}
                  className="flex items-center gap-2 rounded-lg border px-3 py-2 text-xs font-medium"
                  style={comCampanha ? { borderColor: BRAND.teal, background: "#E6F6F6", color: "#2C8E8E" } : { borderColor: "#e2e8f0", color: "#64748b" }}>
                  <Megaphone size={14} /> {comCampanha ? "Aplicada (jun–dez)" : "Desligada"}
                </button>
              </div>
            </div>
          </div>

          {/* Resultado */}
          <div className="mb-4 grid grid-cols-2 gap-3 lg:grid-cols-3">
            <Kpi icon={Wallet} tone="emerald" label={`Projeção ${N_FUT} quinzenas`} value={fmtBRL(comCampanha ? proj.totalProj : proj.totalSemCamp)} sub={comCampanha ? "com campanha 50%" : "30% liso"} />
            <Kpi icon={Megaphone} tone="teal" label="Ganho da campanha" value={fmtBRL(proj.totalProj - proj.totalSemCamp)} sub="extra dos 50% nas safras jun+" />
            <Kpi icon={TrendingUp} tone="blue" label="Média por quinzena" value={fmtBRL((comCampanha ? proj.totalProj : proj.totalSemCamp) / N_FUT)} />
          </div>

          <div className="overflow-hidden rounded-xl border border-slate-200 bg-white">
            <div className="border-b border-slate-100 px-4 py-2.5 text-sm font-semibold text-slate-700">Próximos repasses projetados</div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="border-b border-slate-100 bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-500">
                  <th className="px-4 py-2.5">Quinzena (venda)</th><th className="px-4 py-2.5">Pagamento</th><th className="px-4 py-2.5">Novas créd.</th><th className="px-4 py-2.5">Recorrentes</th>
                  <th className="px-4 py-2.5">Novas (R$)</th><th className="px-4 py-2.5">Recorrente (R$)</th><th className="px-4 py-2.5">Total</th>
                </tr></thead>
                <tbody>
                  {proj.linhas.map((l, i) => (
                    <tr key={i} className="border-b border-slate-50 last:border-0">
                      <td className="px-4 py-2.5 font-medium text-slate-800">{l.label}{l.novasCamp > 0 && comCampanha && <span className="ml-1 rounded-full bg-emerald-50 px-1.5 py-0.5 text-[10px] text-emerald-700">{fmtInt(l.novasCamp)} a 50%</span>}</td>
                      <td className="px-4 py-2.5 text-slate-600">{brFromISO(l.pagamento)}</td>
                      <td className="px-4 py-2.5">{fmtInt(l.novas)}</td>
                      <td className="px-4 py-2.5">{fmtInt(l.recorrentes)}</td>
                      <td className="px-4 py-2.5 text-slate-600">{fmtBRL(comCampanha ? l.valNovas : l.novas * planoValor * comissaoPct)}</td>
                      <td className="px-4 py-2.5 text-slate-600">{fmtBRL(l.valRec)}</td>
                      <td className="px-4 py-2.5 font-semibold text-emerald-700">{fmtBRL(comCampanha ? l.total : l.totalSemCamp)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div className="mt-5 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
            <SectionTitle>Carteira realizada × projetada</SectionTitle>
            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={chartData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#eef2f7" />
                <XAxis dataKey="label" tick={{ fontSize: 9 }} angle={-35} textAnchor="end" height={64} interval={0} />
                <YAxis tick={{ fontSize: 11 }} />
                <Tooltip formatter={(v) => fmtBRL(v)} />
                <Bar dataKey="valor" radius={[3, 3, 0, 0]} name="Repasse">
                  {chartData.map((d, i) => <Cell key={i} fill={d.tipo === "Projetado" ? BRAND.teal : BRAND.blue} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
            <p className="mt-2 text-xs text-slate-400">
              Azul = realizado (planilhas do parceiro) · Verde-água = projetado. Motor: cada safra de venda credita ~{fmtPct(proj.conv)} ao longo de 2–3 quinzenas;
              carteira recorrente renova {fmtPct(proj.recRate)}/quinzena; valor por vida = {fmtBRL(planoValor * comissaoPct)} (recorrência) e {fmtBRL(planoValor * 0.5)} (1ª venda na campanha).
            </p>
          </div>
        </>
      )}
    </>
  );
}

/* ---------- Relatórios ---------- */
function RelatoriosView({ model, repasses }) {
  const exportXlsx = (rows, sheetName, fileName) => {
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, fileName);
  };

  const funilCompleto = model.enriched.map((v) => ({
    Data: v.dataBR, Hora: v.hora, Cliente: v.nome, CPF: v.cpf, Tipo: v.recorrencia === "NOVA" ? "1ª venda" : "Recorrente",
    Operador: v.operador, Equipe: v.equipe, Telefone: v.telefone,
    Auditoria: STATUS_THEME[v.statusAud]?.label || v.statusAud,
    Primeiro_Credito: v.statusCred ? (STATUS_THEME[v.statusCred]?.label || v.statusCred) : "",
    Estornado: v.estornado ? "Sim" : "Não", Motivo_Auditoria: v.motivoAud,
  }));
  const aVerificar = model.ibSemAud.map((v) => ({ Data: v.dataBR, Cliente: v.nome, CPF: v.cpf, Operador: v.operador, Equipe: v.equipe, Telefone: v.telefone, Situacao: "Sem auditoria – verificar" }));
  const carteiraRows = model.carteira.map((q) => ({ Quinzena: q.label, Quitadas: q.quitadas, Primeira_Venda: q.novas, Recorrentes: q.recorrentes, Valor_Creditado: q.valorCreditado, Data_Pagamento: q.dataPagamento ? brFromISO(q.dataPagamento) : "" }));

  const f = model.funnel;
  const consolidado = [
    { Indicador: "Fechamentos (registros)", Valor: f.fechamentosRegistros },
    { Indicador: "Clientes únicos", Valor: f.clientesUnicos },
    { Indicador: "Aprovadas na auditoria", Valor: f.aprovadas },
    { Indicador: "Recusadas na auditoria", Valor: f.recusadas },
    { Indicador: "A verificar", Valor: f.verificar },
    { Indicador: "iBridge sem auditoria", Valor: f.pendente },
    { Indicador: "Creditadas (vidas)", Valor: f.creditadas },
    { Indicador: "Em trânsito", Valor: f.emTransito },
    { Indicador: "Carteira total (R$)", Valor: model.carteiraTotal },
    { Indicador: "Clientes na carteira", Valor: model.clientesCreditados },
    { Indicador: "Estornos (R$)", Valor: model.estTotal },
    { Indicador: "Comissão total creditada (R$)", Valor: model.comissao.total },
  ];

  const reports = [
    { title: "Funil completo", desc: "Todas as vendas do iBridge com TIPO, auditoria e 1º crédito.", n: funilCompleto.length, on: () => exportXlsx(funilCompleto, "Funil", "Cred_GT_Funil_Completo.xlsx"), icon: Database, disabled: !funilCompleto.length },
    { title: "Vendas a verificar", desc: "Vendas do iBridge sem correspondência na auditoria.", n: aVerificar.length, on: () => exportXlsx(aVerificar, "A Verificar", "Cred_GT_A_Verificar.xlsx"), icon: AlertTriangle, disabled: !aVerificar.length },
    { title: "Carteira por quinzena", desc: "Histórico de crédito: período, quitadas, 1ª venda × recorrente, valor.", n: carteiraRows.length, on: () => exportXlsx(carteiraRows, "Carteira", "Cred_GT_Carteira.xlsx"), icon: CreditCard, disabled: !carteiraRows.length },
    { title: "Resumo consolidado", desc: "Indicadores-chave do funil em uma planilha.", n: consolidado.length, on: () => exportXlsx(consolidado, "Resumo", "Cred_GT_Resumo.xlsx"), icon: FileText, disabled: !f.fechamentosRegistros },
  ];

  return (
    <>
      <PageHeader title="Relatórios" desc="Exporte o funil e os indicadores para Excel." />
      <div className="grid gap-3 sm:grid-cols-2">
        {reports.map((r, i) => (
          <div key={i} className="flex items-center justify-between gap-4 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
            <div className="flex items-start gap-3">
              <span className="grid h-10 w-10 place-items-center rounded-lg bg-slate-100 text-slate-500"><r.icon size={18} /></span>
              <div>
                <h3 className="text-sm font-semibold text-slate-800">{r.title}</h3>
                <p className="mt-0.5 text-xs text-slate-500">{r.desc}</p>
                <span className="mt-1 inline-block text-xs text-slate-400">{fmtInt(r.n)} linhas</span>
              </div>
            </div>
            <button onClick={r.on} disabled={r.disabled}
              className="inline-flex items-center gap-1.5 rounded-lg bg-slate-900 px-3 py-2 text-xs font-medium text-white hover:bg-slate-700 disabled:opacity-40">
              <Download size={14} /> Baixar
            </button>
          </div>
        ))}
      </div>
    </>
  );
}
