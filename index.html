<!-- ============ Shim window.storage -> Firebase (compartilhado) / localStorage (sessão) ============ -->
<script>
(function () {
  try { firebase.initializeApp(window.FIREBASE_CONFIG); }
  catch (e) { console.error("Falha ao iniciar Firebase — confira FIREBASE_CONFIG.", e); }
  var db = null;
  try { db = firebase.database(); } catch (e) { console.error("Realtime Database indisponível.", e); }

  // Só a sessão fica local por dispositivo; o resto é base única compartilhada.
  var LOCAIS = { "credgt:session": true };
  var sani = function (k) { return String(k).replace(/[.#$\[\]/:]/g, "_"); };

  window.storage = {
    get: function (key) {
      if (LOCAIS[key]) {
        try { var v = localStorage.getItem(key); return Promise.resolve(v != null ? { value: v } : null); }
        catch (e) { return Promise.resolve(null); }
      }
      if (!db) return Promise.resolve(null);
      return db.ref("credgt/" + sani(key)).once("value").then(function (snap) {
        var v = snap.exists() ? snap.val() : null;
        return v != null ? { value: v } : null;
      }).catch(function () { return null; });
    },
    set: function (key, value) {
      if (LOCAIS[key]) {
        try { localStorage.setItem(key, value); } catch (e) {}
        return Promise.resolve();
      }
      if (!db) return Promise.resolve();
      return db.ref("credgt/" + sani(key)).set(value).catch(function (e) { console.warn("storage.set", e); });
    },
    delete: function (key) {
      if (LOCAIS[key]) { try { localStorage.removeItem(key); } catch (e) {} return Promise.resolve(); }
      if (!db) return Promise.resolve();
      return db.ref("credgt/" + sani(key)).remove().catch(function () {});
    }
  };
})();
</script>

/* ---------- Camada de armazenamento (persiste entre sessões) ----------

const store = {
  async get(key) {
    try {
      if (typeof window !== "undefined" && window.storage) {
        const r = await window.storage.get(key);
        return r ? JSON.parse(r.value) : null;
      }
    } catch (e) { /* chave inexistente ou indisponível */ }
    return null;
  },
  async set(key, value) {
    try {
      if (typeof window !== "undefined" && window.storage) {
        await window.storage.set(key, JSON.stringify(value));

};

/* ---------- Helpers ---------- */
const onlyDigits = (s) => String(s ?? "").replace(/\D/g, "");
const normCpf = (v) => {
  const d = onlyDigits(v);

  return d.padStart(11, "0").slice(-11);
};
const stripAccents = (s) =>
  String(s ?? "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
const normKey = (s) => stripAccents(s).trim().toUpperCase().replace(/\s+/g, " ");

const fmtBRL = (n) =>

const fmtInt = (n) => (Number(n) || 0).toLocaleString("pt-BR");
const fmtPct = (n) => `${((Number(n) || 0) * 100).toFixed(1)}%`;

/* Converte valores monetários em texto para número.
   Lida com "R$ 4,002.99" (en-US: vírgula=milhar, ponto=decimal),
   "R$ 9.028,70" (pt-BR: ponto=milhar, vírgula=decimal), "79,90" e números puros. */
function parseMoney(v) {
  if (v == null || v === "") return 0;
  if (typeof v === "number") return isNaN(v) ? 0 : v;
  let s = String(v).trim().replace(/[^0-9.,-]/g, ""); // tira "R$", espaços, etc.
  if (!s) return 0;
  const lastComma = s.lastIndexOf(",");
  const lastDot = s.lastIndexOf(".");
  if (lastComma > -1 && lastDot > -1) {
    // ambos presentes: o separador mais à direita é o decimal
    if (lastComma > lastDot) s = s.replace(/\./g, "").replace(",", "."); // pt-BR
    else s = s.replace(/,/g, "");                                        // en-US
  } else if (lastComma > -1) {
    s = s.replace(",", "."); // só vírgula -> decimal (pt-BR ex.: 79,90)
  }
  const n = Number(s);
  return isNaN(n) ? 0 : n;
}

/* Converte percentual em fração. "62%" -> 0.62, "0,48" -> 0.48, 62 -> 0.62 */
function parsePct(v) {
  if (v == null || v === "") return 0;
  const hasPct = String(v).includes("%");
  const n = parseMoney(String(v).replace("%", ""));
  if (hasPct) return n / 100;
  return n > 1 ? n / 100 : n;
}

/* Mês de uma dataISO (aaaa-mm) e rótulo amigável */
const mesDeISO = (iso) => (iso ? String(iso).slice(0, 7) : null);
const MESES_PT = ["jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];
const labelMes = (ym) => { if (!ym) return "—"; const [y, m] = ym.split("-"); return `${MESES_PT[Number(m) - 1] || m}/${y.slice(2)}`; };
const mesAtualISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; };
/* Identidade física de um fechamento (para acumular uploads sem duplicar) */
const uidIb = (r) => `${r.cpf || "?"}|${r.dataISO || "?"}|${r.hora || "?"}`;

/* Campanha ativa que cobre uma data (aaaa-mm-dd). Retorna a 1ª que casar. */
function campanhaDaData(campanhas, iso) {
  if (!iso || !campanhas) return null;
  return campanhas.find((c) => c.ativa && (!c.inicio || iso >= c.inicio) && (!c.fim || iso <= c.fim)) || null;
}

/* Lê período e valor a partir do nome do arquivo da quinzena.
   Ex.: "01_06_26_A_15_06_26_-_9028_70.xlsx" -> {ini:2026-06-01, fim:2026-06-15, valor:9028.70} */
function metaFromFilename(name) {
  const m = String(name || "").match(/(\d{2})_(\d{2})_(\d{2})_A_(\d{2})_(\d{2})_(\d{2})(?:_-_(\d+)_(\d+))?/);
  if (!m) return null;
  const [, d1, m1, y1, d2, m2, y2, intp, decp] = m;
  const ini = `20${y1}-${m1}-${d1}`, fim = `20${y2}-${m2}-${d2}`;
  const valor = intp != null ? parseMoney(`${intp}.${decp}`) : null;
  return { ini, fim, valor };
}
const brFromISO = (iso) => { if (!iso) return ""; const [y, m, d] = String(iso).split("-"); return `${d}/${m}/${y}`; };
const labelQuinzena = (ini, fim) => `${brFromISO(ini)} a ${brFromISO(fim)}`;

/* Datas: aceita dd/mm/aaaa, aaaa-mm-dd e objetos Date serializados */
function parseData(v) {
  if (v == null || v === "") return null;
  if (v instanceof Date) {
    return { iso: v.toISOString().slice(0, 10), br: brFromISO(v.toISOString().slice(0, 10)) };
  }
  const s = String(v).trim();
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (m) {
    let [, d, mo, y] = m;
    // Heurística: se o "mês" > 12 e o "dia" <= 12, está em M/D (ex.: estornos "6/15/26")
    if (Number(mo) > 12 && Number(d) <= 12) { const t = d; d = mo; mo = t; }
    if (y.length === 2) y = "20" + y;
    const iso = `${y}-${mo.padStart(2, "0")}-${d.padStart(2, "0")}`;
    return { iso, br: `${d.padStart(2, "0")}/${mo.padStart(2, "0")}/${y}` };
  }
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) {
    const [, y, mo, d] = m;
    const iso = `${y}-${mo.padStart(2, "0")}-${d.padStart(2, "0")}`;
    return { iso, br: brFromISO(iso) };
  }
  return null;
}

/* Normaliza resultado da auditoria (coluna ELEGIVEL, cheia de variações) */
function normElegivel(v) {
  const s = stripAccents(String(v ?? "")).trim().toLowerCase();
  if (s === "sim" || s === "s" || s === "elegivel") return "APROVADA";
  if (s === "nao" || s === "n" || s === "nao elegivel" || s === "inelegivel") return "RECUSADA";
  return "VERIFICAR"; // vazio, ".", "talvez", "sem audio", "audio curto", etc.
}

/* Normaliza retorno do banco (coluna RETORNO do Repasse) */
function normRetorno(v) {
  const s = stripAccents(String(v ?? "")).trim().toUpperCase();
  if (!s) return "SEM_RETORNO";
  if (s.includes("QUITAD")) return "CREDITADO";
  if (s.includes("CANCELAMENTO") || s.includes("CANCELAD")) return "CANCELADO";
  if (s.includes("NAO EFETUADO") || s.includes("INVALID") || s.includes("INSUFICIEN") ||
      s.includes("NAO CADASTR") || s.includes("NAO PERTENCE") || s.includes("RESTRIC"))
    return "NAO_EFETUADO";
  return "OUTRO";
}

/* Mapeia cabeçalhos reais -> campos canônicos, tolerando acentos/espaços */
function buildRow(rawRow, aliasMap) {
  const norm = {};
  for (const k of Object.keys(rawRow)) norm[normKey(k)] = rawRow[k];
  const out = {};
  for (const [field, aliases] of Object.entries(aliasMap)) {
    let val = null;
    for (const a of aliases) {
      const nk = normKey(a);
      if (nk in norm && norm[nk] != null && String(norm[nk]).trim() !== "") {
        val = norm[nk];
        break;
      }
    }
    out[field] = val;
  }
  return out;
}

/* ---------- Leitura de arquivo (xlsx ou csv, com encoding seguro) ---------- */
function lerArquivo(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    const isCsv = /\.csv$/i.test(file.name);
    reader.onerror = () => reject(reader.error || new Error("Falha ao ler arquivo"));
    reader.onload = (e) => {
      try {
        if (isCsv) {
          const buf = e.target.result;
          let txt = new TextDecoder("utf-8").decode(buf);
          if (txt.includes("\uFFFD")) txt = new TextDecoder("windows-1252").decode(buf);
          resolve(XLSX.read(txt, { type: "string", raw: false }));
        } else {
          resolve(XLSX.read(e.target.result, { type: "array", cellDates: true }));
        }
      } catch (err) { reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}
const sheetObjs = (wb, name) =>
  XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: null, raw: false });
const sheetAOA = (wb, name) =>
  XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: null, raw: false });

/* ---------- Parsers por etapa ---------- */
const ALIAS_IBRIDGE = {
  cpf: ["Código", "Codigo", "CPF"],
  nome: ["Contato", "Nome"],
  data: ["Data"],
  hora: ["Hora"],
  operador: ["Operador"],
  equipe: ["Equipe"],
  telefone: ["Telefone"],
  operacao: ["Operação", "Operacao"],
  mailing: ["Mailing"],
  ocorrencia: ["Ocorrência", "Ocorrencia"],
};
function parseIbridge(wb) {
  const rows = sheetObjs(wb, wb.SheetNames[0]);
  const out = [];
  for (const r of rows) {
    const b = buildRow(r, ALIAS_IBRIDGE);
    const cpf = normCpf(b.cpf);
    if (!cpf && !b.nome) continue;
    const d = parseData(b.data);
    const row = {
      cpf,
      nome: (b.nome || "").toString().trim(),
      dataISO: d?.iso || null,
      dataBR: d?.br || (b.data || ""),
      hora: b.hora || "",
      operador: (b.operador || "").toString().trim(),
      equipe: (b.equipe || "").toString().trim(),
      telefone: b.telefone || "",
      operacao: b.operacao || "",
      mailing: b.mailing || "",
    };
    row.mesISO = mesDeISO(row.dataISO);
    row.uid = uidIb(row);
    out.push(row);
  }
  return out;
}

const ALIAS_AUD = {
  cpf: ["CPF", "Código", "Codigo"],
  nome: ["Nome", "Contato"],
  data: ["Data"],
  parceiro: ["Parceiro", "Empresa"],
  elegivel: ["Elegivel", "Elegível", "Status", "Resultado"],
  operador: ["Operador"],
  motivo: ["Motivo", "Observação", "Observacao"],
};
function parseAuditoria(wb) {
  const rows = sheetObjs(wb, wb.SheetNames[0]);
  const out = [];
  for (const r of rows) {
    const b = buildRow(r, ALIAS_AUD);
    const cpf = normCpf(b.cpf);
    if (!cpf && !b.nome) continue;
    const d = parseData(b.data);
    out.push({
      cpf,

    });
  }
  return out;
}

/* Repasse: workbook multi-aba (Clientes / Resumo / Estornados) */
const ALIAS_REP_CLI = {
  nome: ["Nome"], cpf: ["CPF"], retorno: ["Retorno", "Retorno Bancario", "Status"],
  empresa: ["Empresa", "Parceiro"], parcela: ["Parcela"],
};
const ALIAS_REP_EST = {
  data: ["Data"], nome: ["Nome"], cpf: ["CPF"], valor: ["Valor"], empresa: ["Empresa", "Parceiro"],
};
function classifySheet(wb, name) {
  const aoa = sheetAOA(wb, name).slice(0, 4);
  const headerCells = aoa.flat().map((c) => normKey(c));
  const nm = normKey(name);
  if (nm.includes("CLIENTE") || nm.includes("CREDITO") || headerCells.includes("RETORNO") || headerCells.includes("RETORNO BANCARIO")) return "clientes";
  if (nm.includes("ESTORN") || (headerCells.includes("VALOR") && headerCells.includes("CPF") && !headerCells.includes("RETORNO"))) return "estornados";
  if (nm.includes("RESUMO") || (headerCells.includes("REPASSE") && (headerCells.includes("EMPRESA") || headerCells.includes("VIDAS")))) return "resumo";
  return "ignorar";
}
function parseRepasse(wb) {
  const clientes = [], estornados = [];
  let resumo = { empresas: [], valorAReceber: null };
  for (const name of wb.SheetNames) {
    const tipo = classifySheet(wb, name);
    if (tipo === "clientes") {
      for (const r of sheetObjs(wb, name)) {
        const b = buildRow(r, ALIAS_REP_CLI);
        const cpf = normCpf(b.cpf);
        if (!cpf && !b.nome) continue;
        const parc = b.parcela != null && String(b.parcela).trim() !== "" ? Number(onlyDigits(b.parcela)) || null : null;
        clientes.push({
          cpf, nome: (b.nome || "").toString().trim(),
          retornoRaw: (b.retorno || "").toString().trim(),
          retorno: normRetorno(b.retorno),
          empresa: (b.empresa || "").toString().trim(),
          parcela: parc,
        });
      }
    } else if (tipo === "estornados") {
      for (const r of sheetObjs(wb, name)) {
        const b = buildRow(r, ALIAS_REP_EST);
        const cpf = normCpf(b.cpf);
        if (!cpf && !b.nome) continue;
        const d = parseData(b.data);
        estornados.push({
          cpf, nome: (b.nome || "").toString().trim(),
          dataBR: d?.br || (b.data || ""),
          valor: parseMoney(b.valor),
          empresa: (b.empresa || "").toString().trim(),
        });
      }
    } else if (tipo === "resumo") {
      const aoa = sheetAOA(wb, name);
      let hi = aoa.findIndex((row) => row.map(normKey).includes("EMPRESA") && row.map(normKey).includes("REPASSE"));
      if (hi >= 0) {
        const hdr = aoa[hi].map(normKey);
        const idx = (k) => hdr.indexOf(k);
        for (let i = hi + 1; i < aoa.length; i++) {
          const row = aoa[i];
          const emp = row[idx("EMPRESA")];
          if (!emp) continue;
          const empN = normKey(emp);
          if (empN.includes("VALOR A RECEBER")) {
            resumo.valorAReceber = parseMoney(row[idx("ENVIO")] ?? row[1]) || null;
            continue;
          }
          resumo.empresas.push({
            empresa: String(emp).trim(),
            envio: Number(onlyDigits(row[idx("ENVIO")])) || 0,
            vidas: Number(onlyDigits(row[idx("VIDAS")])) || 0,
            estornados: parseMoney(row[idx("ESTORNADOS")]),
            repasse: parseMoney(row[idx("REPASSE")]),
            conversao: parsePct(row[idx("CONVERSAO")]),
          });
        }
      } else {
        // Formato antigo: VIDAS | REPASSE (sem empresa) — total único
        let hv = aoa.findIndex((row) => row.map(normKey).includes("REPASSE") && row.map(normKey).includes("VIDAS"));
        if (hv >= 0) {
          const hdr = aoa[hv].map(normKey);
          const idx = (k) => hdr.indexOf(k);
          const linha = aoa[hv + 1] || [];
          resumo.empresas.push({
            empresa: "Total",
            envio: 0,
            vidas: Number(onlyDigits(linha[idx("VIDAS")])) || 0,
            estornados: 0,
            repasse: parseMoney(linha[idx("REPASSE")]),
            conversao: 0,
          });
        }
      }
    }
  }
  return { clientes, estornados, resumo };
}

  // size = altura em px; a largura segue a proporção da arte (~2:1)

    return (
      <span className="inline-flex items-center rounded-lg bg-white px-2.5 py-1.5 shadow-sm">
        <img src={LOGO_DATAURI} alt="Cred GT" style={{ height: size, width: "auto", display: "block" }} />
      </span>
    );
  }
  return <img src={LOGO_DATAURI} alt="Cred GT" style={{ height: size, width: "auto", display: "block" }} />;
}

/* ---------- UI atômica ---------- */
const STATUS_THEME = {
  APROVADA:    { label: "Aprovada",     cls: "bg-emerald-50 text-emerald-700 ring-emerald-600/20" },
  RECUSADA:    { label: "Recusada",     cls: "bg-rose-50 text-rose-700 ring-rose-600/20" },
  VERIFICAR:   { label: "A verificar",  cls: "bg-amber-50 text-amber-700 ring-amber-600/20" },
  PENDENTE:    { label: "Sem auditoria",cls: "bg-slate-100 text-slate-600 ring-slate-500/20" },
  CREDITADO:   { label: "Creditado",    cls: "bg-emerald-50 text-emerald-700 ring-emerald-600/20" },
  NAO_EFETUADO:{ label: "Não efetuado", cls: "bg-amber-50 text-amber-700 ring-amber-600/20" },
  CANCELADO:   { label: "Cancelado",    cls: "bg-rose-50 text-rose-700 ring-rose-600/20" },
  EM_TRANSITO: { label: "Em trânsito",  cls: "bg-sky-50 text-sky-700 ring-sky-600/20" },
  SEM_RETORNO: { label: "Sem retorno",  cls: "bg-slate-100 text-slate-600 ring-slate-500/20" },
  OUTRO:       { label: "Outro",        cls: "bg-slate-100 text-slate-600 ring-slate-500/20" },
};
function Badge({ status }) {
  const t = STATUS_THEME[status] || { label: status, cls: "bg-slate-100 text-slate-600 ring-slate-500/20" };
  return <span className={`inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium ring-1 ring-inset ${t.cls}`}>{t.label}</span>;
}

function Kpi({ icon: Icon, label, value, sub, tone = "slate" }) {
  const tones = {
    slate: "text-slate-500 bg-slate-100",
    emerald: "text-emerald-600 bg-emerald-50",
    sky: "text-sky-600 bg-sky-50",
    amber: "text-amber-600 bg-amber-50",
    rose: "text-rose-600 bg-rose-50",
    violet: "text-violet-600 bg-violet-50",
    blue: "text-[#2F6E9E] bg-[#EAF3FA]",
    teal: "text-[#2C8E8E] bg-[#E6F6F6]",
  };
  return (
    <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
      <div className="flex items-center justify-between">
        <span className="text-xs font-medium uppercase tracking-wide text-slate-500">{label}</span>
        <span className={`grid h-8 w-8 place-items-center rounded-lg ${tones[tone]}`}><Icon size={16} /></span>
      </div>
      <div className="mt-2 text-2xl font-semibold text-slate-900">{value}</div>
      {sub && <div className="mt-0.5 text-xs text-slate-500">{sub}</div>}
    </div>
  );
}

function UploadCard({ title, hint, accept, onFile, count, onClear, loading }) {
  const inputId = "up-" + title.replace(/\s+/g, "");
  return (
    <div className="rounded-xl border border-dashed border-slate-300 bg-white p-5">
      <div className="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h3 className="text-sm font-semibold text-slate-800">{title}</h3>
          <p className="mt-0.5 text-xs text-slate-500">{hint}</p>
        </div>
        <div className="flex items-center gap-2">
          {count > 0 && (
            <span className="rounded-full bg-emerald-50 px-2.5 py-1 text-xs font-medium text-emerald-700 ring-1 ring-inset ring-emerald-600/20">
              {fmtInt(count)} registros
            </span>
          )}
          <label htmlFor={inputId}
            className="inline-flex cursor-pointer items-center gap-1.5 rounded-lg bg-slate-900 px-3 py-2 text-xs font-medium text-white hover:bg-slate-700">
            {loading ? <RefreshCw size={14} className="animate-spin" /> : <Upload size={14} />}
            {loading ? "Processando…" : "Enviar planilha"}
          </label>
          <input id={inputId} type="file" accept={accept} className="hidden"
            onChange={(e) => { const f = e.target.files?.[0]; if (f) onFile(f); e.target.value = ""; }} />
          {count > 0 && (
            <button onClick={onClear} title="Limpar dados"
              className="inline-flex items-center gap-1 rounded-lg border border-slate-200 px-2.5 py-2 text-xs text-slate-600 hover:bg-slate-50">
              <Trash2 size={14} />
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function SectionTitle({ children, right }) {
  return (
    <div className="mb-3 flex items-center justify-between">
      <h2 className="text-sm font-semibold uppercase tracking-wide text-slate-700">{children}</h2>
      {right}
    </div>
  );
}

/* Tabela reutilizável: busca, filtros, paginação */
function DataTable({ columns, rows, searchKeys = [], filters = [], pageSize = 25, empty = "Nenhum registro." }) {
  const [q, setQ] = useState("");
  const [fvals, setFvals] = useState({});
  const [page, setPage] = useState(0);
  useEffect(() => setPage(0), [q, fvals, rows]);

  const filtered = useMemo(() => {
    const term = stripAccents(q).toLowerCase().trim();
    return rows.filter((r) => {
      for (const f of filters) {
        const v = fvals[f.key];
        if (v && v !== "__all__" && String(r[f.key] ?? "") !== v) return false;
      }
      if (!term) return true;
      return searchKeys.some((k) => stripAccents(String(r[k] ?? "")).toLowerCase().includes(term));
    });
  }, [rows, q, fvals, filters, searchKeys]);

  const total = filtered.length;
  const start = page * pageSize;
  const pageRows = filtered.slice(start, start + pageSize);
  const maxPage = Math.max(0, Math.ceil(total / pageSize) - 1);

  return (
    <div className="rounded-xl border border-slate-200 bg-white shadow-sm">
      <div className="flex flex-wrap items-center gap-2 border-b border-slate-100 p-3">
        {searchKeys.length > 0 && (
          <div className="relative flex-1 min-w-[200px]">
            <Search size={14} className="absolute left-2.5 top-2.5 text-slate-400" />
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Buscar por nome ou CPF…"
              className="w-full rounded-lg border border-slate-200 py-2 pl-8 pr-3 text-sm outline-none focus:border-slate-400" />
          </div>
        )}
        {filters.map((f) => (
          <div key={f.key} className="flex items-center gap-1.5">
            <Filter size={13} className="text-slate-400" />
            <select value={fvals[f.key] || "__all__"} onChange={(e) => setFvals((p) => ({ ...p, [f.key]: e.target.value }))}
              className="rounded-lg border border-slate-200 py-2 pl-2 pr-7 text-sm text-slate-700 outline-none focus:border-slate-400">
              <option value="__all__">{f.label}: todos</option>
              {f.options.map((o) => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
        ))}
        <span className="ml-auto text-xs text-slate-500">{fmtInt(total)} registros</span>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-slate-100 text-left text-xs uppercase tracking-wide text-slate-500">
              {columns.map((c) => <th key={c.key} className="px-3 py-2 font-medium whitespace-nowrap">{c.title}</th>)}
            </tr>
          </thead>
          <tbody>
            {pageRows.length === 0 ? (
              <tr><td colSpan={columns.length} className="px-3 py-10 text-center text-slate-400">{empty}</td></tr>
            ) : pageRows.map((r, i) => (
              <tr key={i} className="border-b border-slate-50 hover:bg-slate-50/60">
                {columns.map((c) => (
                  <td key={c.key} className="px-3 py-2 align-top text-slate-700 whitespace-nowrap">
                    {c.render ? c.render(r) : (r[c.key] ?? "—")}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {total > pageSize && (
        <div className="flex items-center justify-between border-t border-slate-100 p-3 text-xs text-slate-600">
          <span>{fmtInt(start + 1)}–{fmtInt(Math.min(start + pageSize, total))} de {fmtInt(total)}</span>
          <div className="flex items-center gap-1">
            <button disabled={page === 0} onClick={() => setPage((p) => p - 1)}
              className="rounded-md border border-slate-200 p-1.5 disabled:opacity-40 hover:bg-slate-50"><ChevronLeft size={14} /></button>
            <span className="px-2">{page + 1} / {maxPage + 1}</span>
            <button disabled={page >= maxPage} onClick={() => setPage((p) => p + 1)}
              className="rounded-md border border-slate-200 p-1.5 disabled:opacity-40 hover:bg-slate-50"><ChevronRight size={14} /></button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- App ---------- */
const MENUS = MENU_DEFS.map(([id, label, icon]) => ({ id, label, icon }));
const CHART_COLORS = [BRAND.blue, BRAND.teal, "#d97706", "#e11d48", BRAND.blueDeep, BRAND.gray, "#16a34a"];

function App() {
  const [menu, setMenu] = useState("dashboard");
  const [ibridge, setIbridge] = useState([]);
  const [auditoria, setAuditoria] = useState([]);
  const [repasses, setRepasses] = useState([]); // histórico de quinzenas de crédito
  const [planoValor, setPlanoValor] = useState(PLANO_VALOR_PADRAO);
  const [comissaoPct, setComissaoPct] = useState(COMISSAO_PCT_PADRAO);
  const [metaMensal, setMetaMensal] = useState(1400);
  const [campanhas, setCampanhas] = useState([]);
  const [loading, setLoading] = useState("");
  const [toast, setToast] = useState(null);

  // Autenticação
  const [users, setUsers] = useState(null);     // null = carregando
  const [sessao, setSessao] = useState(null);    // usuário logado
  const [booted, setBooted] = useState(false);

  useEffect(() => {
    (async () => {
      const [ib, au, rps, rpOld, cfg, us, ss, cps] = await Promise.all([
        store.get(STORAGE_KEYS.ibridge), store.get(STORAGE_KEYS.auditoria),
        store.get(STORAGE_KEYS.repasses), store.get(STORAGE_KEYS.repasse), store.get(STORAGE_KEYS.config),
        store.get(STORAGE_KEYS.users), store.get(STORAGE_KEYS.session),
        store.get(STORAGE_KEYS.campanhas),
      ]);
      if (ib) setIbridge(ib);
      if (au) setAuditoria(au);
      if (rps && rps.length) setRepasses(rps);
      else if (rpOld && rpOld.clientes?.length) {
        // migra a planilha única antiga para uma quinzena do histórico
        const mig = [{ id: "q_legado", periodoIni: "", periodoFim: "", dataPagamento: "", valorCreditado: rpOld.resumo?.empresas?.reduce((s, e) => s + (e.repasse || 0), 0) || 0, label: "Importação anterior", ...rpOld, criadoEm: Date.now() }];
        setRepasses(mig); await store.set(STORAGE_KEYS.repasses, mig);
      }
      if (cfg?.planoValor) setPlanoValor(cfg.planoValor);
      if (cfg?.comissaoPct != null) setComissaoPct(cfg.comissaoPct);
      if (cfg?.metaMensal != null) setMetaMensal(cfg.metaMensal);
      if (cps && cps.length) setCampanhas(cps);
      else { setCampanhas(SEED_CAMPANHAS); await store.set(STORAGE_KEYS.campanhas, SEED_CAMPANHAS); }
      const precisaSeed = !us || cfg?.seedVersion !== SEED_VERSION;
      const lista = precisaSeed ? SEED_USERS : (migrarUsers(us) || SEED_USERS);
      setUsers(lista);
      if (precisaSeed) {
        await store.set(STORAGE_KEYS.users, lista);
        await store.set(STORAGE_KEYS.config, { planoValor: cfg?.planoValor ?? PLANO_VALOR_PADRAO, comissaoPct: cfg?.comissaoPct ?? COMISSAO_PCT_PADRAO, seedVersion: SEED_VERSION });
      }
      if (ss?.login) {
        const u = lista.find((x) => x.login === ss.login);
        if (u) setSessao(u);
      }
      setBooted(true);
    })();
  }, []);

  const flash = (msg, ok = true) => { setToast({ msg, ok }); setTimeout(() => setToast(null), 4000); };

  /* ---------- Usuários / sessão ---------- */
  const persistUsers = async (lista) => { setUsers(lista); await store.set(STORAGE_KEYS.users, lista); };
  const doLogin = async (login, senha) => {
    const u = (users || []).find((x) => x.login === String(login).trim().toLowerCase());
    if (!u) return { erro: "Usuário não encontrado." };
    if (String(senha) !== String(u.senha)) return { erro: "Senha incorreta." };
    if (u.precisaSenha) return { primeiroAcesso: u };
    setSessao(u); await store.set(STORAGE_KEYS.session, { login: u.login });
    return { ok: true };
  };
  const definirSenha = async (userId, novaSenha) => {
    if (!senhaValida(novaSenha)) return { erro: "A senha deve ter exatamente 6 dígitos numéricos." };
    if ((users || []).some((x) => x.id !== userId && x.senha === novaSenha)) return { erro: "Essa senha já está em uso por outro usuário. Escolha outra." };
    const lista = users.map((x) => x.id === userId ? { ...x, senha: novaSenha, precisaSenha: false } : x);
    await persistUsers(lista);
    const u = lista.find((x) => x.id === userId);
    setSessao(u); await store.set(STORAGE_KEYS.session, { login: u.login });
    return { ok: true };
  };
  const logout = async () => { setSessao(null); await store.del(STORAGE_KEYS.session); setMenu("dashboard"); };

  const handleUpload = useCallback(async (file, kind) => {
    setLoading(kind);
    try {
      const wb = await lerArquivo(file);
      if (kind === "ibridge") {
        const novos = parseIbridge(wb);
        if (!novos.length) throw new Error("Nenhuma venda encontrada. Confira se a planilha tem a coluna 'Código' e 'Contato'.");
        // Acumula com o que já está salvo, sem duplicar (chave = CPF|data|hora).
        // Lê a base persistida para garantir o acúmulo mesmo após recarregar a página.
        const salvo = (await store.get(STORAGE_KEYS.ibridge)) || ibridge || [];
        const mapa = new Map(salvo.map((r) => [r.uid || uidIb(r), r]));
        const antes = mapa.size;
        for (const r of novos) mapa.set(r.uid || uidIb(r), r);
        const acumulado = [...mapa.values()].sort((a, b) => (b.dataISO || "").localeCompare(a.dataISO || ""));
        const addNovos = mapa.size - antes;
        await store.set(STORAGE_KEYS.ibridge, acumulado);  // grava ANTES (sem corrida)
        setIbridge(acumulado);
        flash(`iBridge acumulado: +${fmtInt(addNovos)} novos fechamentos (${fmtInt(acumulado.length)} no total).`);
      } else if (kind === "auditoria") {
        const novos = parseAuditoria(wb);
        if (!novos.length) throw new Error("Nenhum registro de auditoria encontrado. Confira as colunas CPF / ELEGÍVEL.");
        // Auditoria também acumula e não duplica (chave = CPF; mantém a melhor classificação)
        const salvo = (await store.get(STORAGE_KEYS.auditoria)) || auditoria || [];
        const prioAud = { APROVADA: 3, RECUSADA: 2, VERIFICAR: 1 };
        const mapa = new Map();
        for (const a of salvo) if (a.cpf) mapa.set(a.cpf, a);
        let add = 0;
        for (const a of novos) {
          if (!a.cpf) continue;
          const cur = mapa.get(a.cpf);
          if (!cur) { mapa.set(a.cpf, a); add++; }
          else if ((prioAud[a.status] || 0) >= (prioAud[cur.status] || 0)) mapa.set(a.cpf, a); // atualiza
        }
        const acumulado = [...mapa.values()];
        await store.set(STORAGE_KEYS.auditoria, acumulado);
        setAuditoria(acumulado);
        flash(`Auditoria acumulada: +${fmtInt(add)} novos CPFs (${fmtInt(acumulado.length)} no total).`);
      }
    } catch (e) {
      flash(e.message || "Falha ao processar a planilha.", false);
    } finally { setLoading(""); }
  }, [ibridge, auditoria]);

  // Lê o arquivo de uma quinzena e devolve {parsed, meta} para o formulário (sem persistir)
  const lerQuinzena = useCallback(async (file) => {
    const wb = await lerArquivo(file);
    const parsed = parseRepasse(wb);
    if (!parsed.clientes.length) throw new Error("Nenhum cliente encontrado na planilha. Confira as abas Clientes/CRÉDITO.");
    return { parsed, meta: metaFromFilename(file.name) };
  }, []);
  const addQuinzena = async (entry) => {
    const nova = [...repasses.filter((q) => q.id !== entry.id), entry]
      .sort((a, b) => (a.periodoIni || "").localeCompare(b.periodoIni || ""));
    setRepasses(nova); await store.set(STORAGE_KEYS.repasses, nova);
    flash(`Quinzena ${entry.label} salva: ${fmtInt(entry.clientes.length)} registros · ${fmtBRL(entry.valorCreditado)}.`);
  };
  const removeQuinzena = async (id) => {
    const nova = repasses.filter((q) => q.id !== id);
    setRepasses(nova); await store.set(STORAGE_KEYS.repasses, nova);
  };

  const clearKind = async (kind) => {
    if (kind === "ibridge") { setIbridge([]); await store.del(STORAGE_KEYS.ibridge); }
    if (kind === "auditoria") { setAuditoria([]); await store.del(STORAGE_KEYS.auditoria); }
    if (kind === "repasse") { setRepasses([]); await store.del(STORAGE_KEYS.repasses); }
  };
  const updateConfig = async (patch) => {
    if (patch.planoValor != null) setPlanoValor(patch.planoValor);
    if (patch.comissaoPct != null) setComissaoPct(patch.comissaoPct);
    if (patch.metaMensal != null) setMetaMensal(patch.metaMensal);
    const cfg = { planoValor: patch.planoValor ?? planoValor, comissaoPct: patch.comissaoPct ?? comissaoPct, metaMensal: patch.metaMensal ?? metaMensal, seedVersion: SEED_VERSION };
    await store.set(STORAGE_KEYS.config, cfg);
  };
  const updatePlano = (v) => updateConfig({ planoValor: v });
  const persistCampanhas = async (lista) => { setCampanhas(lista); await store.set(STORAGE_KEYS.campanhas, lista); };

  /* ---------- Modelo de dados cruzado (o coração do funil) ---------- */
  const model = useMemo(() => {
    // Mapas por CPF (colisão resolvida por prioridade de "melhor desfecho")
    const audByCpf = new Map();
    const audPrio = { APROVADA: 3, RECUSADA: 2, VERIFICAR: 1 };
    for (const a of auditoria) {
      if (!a.cpf) continue;
      const cur = audByCpf.get(a.cpf);
      if (!cur || (audPrio[a.status] || 0) > (audPrio[cur.status] || 0)) audByCpf.set(a.cpf, a);
    }
    /* ---------- Repasses por quinzena (histórico) ---------- */
    // Ordena quinzenas cronologicamente
    const quinzenas = [...repasses].sort((a, b) => (a.periodoIni || "").localeCompare(b.periodoIni || ""));
    // Para cada CPF: status de melhor desfecho + 1ª quitação (quinzena) + nº de quitações
    const repByCpf = new Map();
    const repPrio = { CREDITADO: 4, NAO_EFETUADO: 3, CANCELADO: 2, OUTRO: 1, SEM_RETORNO: 0 };
    const credInfo = new Map(); // cpf -> { primeiroISO, quitacoes, ultimaISO }
    const estByCpf = new Map();
    for (const q of quinzenas) {
      const refISO = q.periodoFim || q.periodoIni || "";
      for (const c of (q.clientes || [])) {
        if (!c.cpf) continue;
        const cur = repByCpf.get(c.cpf);
        if (!cur || (repPrio[c.retorno] || 0) > (repPrio[cur.retorno] || 0)) repByCpf.set(c.cpf, { ...c, quinzena: q.label });
        if (c.retorno === "CREDITADO") {
          const ci = credInfo.get(c.cpf) || { primeiroISO: refISO, quitacoes: 0, ultimaISO: refISO };
          ci.quitacoes += 1;
          if (refISO && (!ci.primeiroISO || refISO < ci.primeiroISO)) ci.primeiroISO = refISO;
          if (refISO && (!ci.ultimaISO || refISO > ci.ultimaISO)) ci.ultimaISO = refISO;
          credInfo.set(c.cpf, ci);
        }
      }
      for (const e of (q.estornados || [])) if (e.cpf) estByCpf.set(e.cpf, e);
    }
    const temRepasses = quinzenas.length > 0;

    // iBridge único por CPF (base do funil) — mantém venda mais recente
    const ibByCpf = new Map();
    for (const v of ibridge) {
      if (!v.cpf) continue;
      const cur = ibByCpf.get(v.cpf);
      if (!cur || (v.dataISO || "") >= (cur.dataISO || "")) ibByCpf.set(v.cpf, v);
    }

    // Registros enriquecidos (todos os fechamentos, com classificação cruzada)
    const enriched = ibridge.map((v) => {
      const aud = v.cpf ? audByCpf.get(v.cpf) : null;
      const statusAud = aud ? aud.status : "PENDENTE";
      let statusCred = null;
      if (statusAud === "APROVADA") {
        const rp = v.cpf ? repByCpf.get(v.cpf) : null;
        statusCred = rp ? rp.retorno : "EM_TRANSITO";
      }
      return {
        ...v,
        statusAud,
        motivoAud: aud?.motivo || "",
        statusCred,
        estornado: v.cpf ? estByCpf.has(v.cpf) : false,
        recorrencia: "NOVA", // definido abaixo, com base no histórico de CRÉDITO
      };
    });

    /* 1ª venda × Recorrente — definido pelo HISTÓRICO de quinzenas creditadas.
       Enquanto não houver planilha de creditadas, TODAS as vendas são "1ª venda".
       A venda é Recorrente se o CPF já teve uma quitação numa quinzena ANTERIOR à entrada da venda. */
    for (const v of enriched) {
      const ci = v.cpf ? credInfo.get(v.cpf) : null;
      v.recorrencia = (ci && ci.primeiroISO && v.dataISO && v.dataISO > ci.primeiroISO) ? "RECORRENTE" : "NOVA";
    }

    // Auditoria sem correspondência no iBridge (registros órfãos)
    const ibCpfs = new Set(ibridge.map((v) => v.cpf).filter(Boolean));
    const audSemIb = auditoria.filter((a) => a.cpf && !ibCpfs.has(a.cpf));

    // iBridge sem auditoria -> "gerar classificação para verificação"
    const audCpfs = new Set(auditoria.map((a) => a.cpf).filter(Boolean));
    const ibSemAud = [...ibByCpf.values()].filter((v) => v.cpf && !audCpfs.has(v.cpf));

    // Repasse sem auditoria (atraso venda->crédito; insumo da Projeção)
    const repSemAud = [...credInfo.keys()].filter((cpf) => !audCpfs.has(cpf)).map((cpf) => ({ cpf }));

    // ----- Carteira por quinzena (histórico) -----
    const carteira = quinzenas.map((q) => {
      const refISO = q.periodoFim || q.periodoIni || "";
      let nova = 0, rec = 0, quit = 0;
      for (const c of (q.clientes || [])) {
        if (c.retorno !== "CREDITADO" || !c.cpf) continue;
        quit += 1;
        const ci = credInfo.get(c.cpf);
        if (ci && ci.primeiroISO === refISO) nova += 1; else rec += 1;
      }
      return {
        id: q.id, label: q.label, periodoIni: q.periodoIni, periodoFim: q.periodoFim,
        dataPagamento: q.dataPagamento || "", valorCreditado: q.valorCreditado || 0,
        quitadas: quit, novas: nova, recorrentes: rec,
        estornos: (q.estornados || []).length,
      };
    });
    const carteiraTotal = carteira.reduce((s, q) => s + (q.valorCreditado || 0), 0);
    const aReceber = carteira.filter((q) => !q.dataPagamento).reduce((s, q) => s + (q.valorCreditado || 0), 0);
    const estTotal = quinzenas.reduce((s, q) => s + (q.estornados || []).reduce((a, e) => a + (e.valor || 0), 0), 0);
    const clientesCreditados = credInfo.size;       // CPFs distintos já creditados (carteira ativa)
    const quitacoesTotal = [...credInfo.values()].reduce((s, c) => s + c.quitacoes, 0);
    const ultimaQuinzena = carteira[carteira.length - 1] || null;

    // Contadores de funil (nível CPF)
    const uniq = [...ibByCpf.values()];
    const aprovadasCpf = uniq.filter((v) => audByCpf.get(v.cpf)?.status === "APROVADA");
    const funnel = {
      fechamentosRegistros: ibridge.length,
      clientesUnicos: uniq.length,
      aprovadas: aprovadasCpf.length,
      recusadas: uniq.filter((v) => audByCpf.get(v.cpf)?.status === "RECUSADA").length,
      verificar: uniq.filter((v) => audByCpf.get(v.cpf)?.status === "VERIFICAR").length,
      pendente: ibSemAud.length,
      creditadas: aprovadasCpf.filter((v) => repByCpf.get(v.cpf)?.retorno === "CREDITADO").length,
      naoEfetuado: aprovadasCpf.filter((v) => repByCpf.get(v.cpf)?.retorno === "NAO_EFETUADO").length,
      cancelado: aprovadasCpf.filter((v) => repByCpf.get(v.cpf)?.retorno === "CANCELADO").length,
      emTransito: aprovadasCpf.filter((v) => !repByCpf.has(v.cpf)).length,
    };

    /* ---------- Comissão GT por CAMPANHA ----------
       A 1ª venda creditada do CPF usa a % "primeira" SE a entrada (fechamento iBridge)
       estiver dentro do período da campanha; da 2ª em diante usa a % "recorrente".
       Fora de campanha, vale a comissão padrão (comissaoPct). */
    const creditadasPorCpf = new Map();
    for (const v of enriched) {
      if (v.statusCred !== "CREDITADO" || !v.cpf) continue;
      const arr = creditadasPorCpf.get(v.cpf) || [];
      arr.push(v); creditadasPorCpf.set(v.cpf, arr);
    }
    for (const arr of creditadasPorCpf.values()) {
      arr.forEach((v) => {
        const primeira = v.recorrencia === "NOVA";
        const camp = campanhaDaData(campanhas, v.dataISO); // campanha pela data de ENTRADA
        const rate = camp ? (primeira ? camp.pctPrimeira : camp.pctRecorrente) : comissaoPct;
        v.creditPrimeira = primeira;
        v.comissaoRate = rate;
        v.comissaoValor = planoValor * rate;
        v.campanhaNome = camp ? camp.nome : null;
      });
    }
    const credList = enriched.filter((v) => v.statusCred === "CREDITADO");
    const credPrimeiras = credList.filter((v) => v.creditPrimeira);
    const credRecorr = credList.filter((v) => !v.creditPrimeira);
    const soma = (arr) => arr.reduce((s, v) => s + (v.comissaoValor || 0), 0);
    const comissao = {
      total: soma(credList), primeira: soma(credPrimeiras), recorrente: soma(credRecorr),
      qtdPrimeira: credPrimeiras.length, qtdRecorrente: credRecorr.length,
    };
    const comissaoRecorrenteMes = funnel.creditadas * planoValor * comissaoPct;
    const receitaPorVenda = planoValor * comissaoPct;

    const novas = enriched.filter((v) => v.recorrencia === "NOVA");
    const recorrentes = enriched.filter((v) => v.recorrencia === "RECORRENTE");
    const rec = {
      novas: novas.length, recorrentes: recorrentes.length,
      novasCreditadas: novas.filter((v) => v.statusCred === "CREDITADO").length,
      recorrentesCreditadas: recorrentes.filter((v) => v.statusCred === "CREDITADO").length,
    };

    /* ====================== ANALYTICS (base 04/2026+) ====================== */
    const MES_CORTE = "2026-04"; // iBridge só é confiável a partir daqui
    const qIdx = (iso) => { const [y, m, d] = String(iso).split("-").map(Number); return (y * 12 + (m - 1)) * 2 + (d >= 16 ? 1 : 0); };

    // Vendas iBridge por mês (entrada) e por dia
    const vendasMesMap = new Map();
    for (const v of ibridge) { if (!v.mesISO) continue; vendasMesMap.set(v.mesISO, (vendasMesMap.get(v.mesISO) || 0) + 1); }
    const vendasPorMes = [...vendasMesMap.entries()].filter(([m]) => m >= MES_CORTE).sort().map(([mes, qtd]) => ({ mes, label: labelMes(mes), qtd }));

    // Entrada (1ª venda) por CPF e mês de entrada
    const entradaCpf = new Map();
    for (const v of ibridge) { if (!v.cpf || !v.dataISO) continue; const c = entradaCpf.get(v.cpf); if (!c || v.dataISO < c) entradaCpf.set(v.cpf, v.dataISO); }

    // Taxa de aprovação na auditoria (real)
    const audTotal = auditoria.length;
    const audAprov = auditoria.filter((a) => a.status === "APROVADA").length;
    const taxaAprovacao = audTotal ? audAprov / audTotal : 0;

    // Safras: por mês de entrada -> entraram, creditaram (1ª quitação), curva de maturação
    const safrasMap = new Map();
    for (const [cpf, vendaISO] of entradaCpf) {
      const mes = mesDeISO(vendaISO); if (mes < MES_CORTE) continue;
      const s = safrasMap.get(mes) || { mes, entradas: 0, creditaram: 0, lags: {} };
      s.entradas += 1;
      const ci = credInfo.get(cpf);
      if (ci && ci.primeiroISO) {
        s.creditaram += 1;
        const lag = qIdx(ci.primeiroISO) - qIdx(vendaISO);
        if (lag >= 0 && lag <= 8) s.lags[lag] = (s.lags[lag] || 0) + 1;
      }
      safrasMap.set(mes, s);
    }
    const safras = [...safrasMap.values()].sort((a, b) => a.mes.localeCompare(b.mes)).map((s) => ({
      ...s, label: labelMes(s.mes), conversao: s.entradas ? s.creditaram / s.entradas : 0,
    }));

    // Curva de maturação consolidada (fração da safra que credita em +k quinzenas) — usa safras maduras
    const curvaAcc = {}; let baseSafra = 0;
    for (const s of safras) {
      // só safras com idade >= 4 quinzenas contam para a curva "madura"
      const idade = ibridge.length ? (qIdx((carteira[carteira.length - 1]?.periodoFim) || mesAtualISO() + "-15") - qIdx(s.mes + "-01")) : 0;
      if (idade >= 4) { baseSafra += s.entradas; for (const k in s.lags) curvaAcc[k] = (curvaAcc[k] || 0) + s.lags[k]; }
    }
    const curvaMaturacao = {}; // k -> fração média da safra
    if (baseSafra > 0) for (const k in curvaAcc) curvaMaturacao[k] = curvaAcc[k] / baseSafra;
    const taxaConvMadura = Object.values(curvaMaturacao).reduce((a, b) => a + b, 0) || 0.27;

    // Retenção média da carteira (recorrentes da quinzena / quitadas da quinzena anterior)
    let retSum = 0, retN = 0;
    for (let i = 1; i < carteira.length; i++) {
      if (carteira[i - 1].quitadas > 0) { retSum += carteira[i].recorrentes / carteira[i - 1].quitadas; retN++; }
    }
    const retencaoMedia = retN ? retSum / retN : 0.7;

    // Performance por operador (volume, aprovação, crédito) — base 04/2026+
    const opMap = new Map();
    for (const v of enriched) {
      if (!v.operador || (v.mesISO && v.mesISO < MES_CORTE)) continue;
      const o = opMap.get(v.operador) || { operador: v.operador, vendas: 0, aprovadas: 0, recusadas: 0, creditadas: 0 };
      o.vendas += 1;
      if (v.statusAud === "APROVADA") o.aprovadas += 1;
      if (v.statusAud === "RECUSADA") o.recusadas += 1;
      if (v.statusCred === "CREDITADO") o.creditadas += 1;
      opMap.set(v.operador, o);
    }
    const porOperador = [...opMap.values()].map((o) => ({ ...o, taxaAprov: o.vendas ? o.aprovadas / o.vendas : 0 })).sort((a, b) => b.vendas - a.vendas);

    // Motivos de recusa (top)
    const motivosMap = new Map();
    for (const a of auditoria) { if (a.status !== "RECUSADA" || !a.motivo) continue; const k = a.motivo.trim().slice(0, 70); motivosMap.set(k, (motivosMap.get(k) || 0) + 1); }
    const motivosRecusa = [...motivosMap.entries()].sort((a, b) => b[1] - a[1]).slice(0, 8).map(([motivo, n]) => ({ motivo, n }));

    const analytics = {
      mesCorte: MES_CORTE, vendasPorMes, taxaAprovacao, audTotal, audAprov,
      safras, curvaMaturacao, taxaConvMadura, retencaoMedia, porOperador, motivosRecusa, qIdx,
    };

    return {
      enriched, audSemIb, ibSemAud, repSemAud, funnel,
      audByCpf, repByCpf, ibByCpf, aprovadasCpf, credInfo,
      temRepasses, carteira, carteiraTotal, aReceber, estTotal, clientesCreditados, quitacoesTotal, ultimaQuinzena,
      repTotal: carteiraTotal, valorAReceber: aReceber, creditadosBanco: clientesCreditados,
      receitaPorVenda, comissao, comissaoRecorrenteMes, rec, analytics,
    };
  }, [ibridge, auditoria, repasses, planoValor, comissaoPct, campanhas]);

  const temDados = ibridge.length || auditoria.length || repasses.length;

  // ----- Gate de autenticação -----
  if (!booted) {
    return <div className="grid min-h-screen place-items-center bg-slate-50 text-slate-400">Carregando…</div>;
  }
  if (!sessao) {
    return <LoginView onLogin={doLogin} onDefinirSenha={definirSenha} />;
  }

  const isAdmin = sessao.papel === "admin";
  const menusVisiveis = MENUS.filter((m) => sessao.menus?.[m.id] !== false && (m.id !== "usuarios" || isAdmin || sessao.menus?.usuarios));
  const menuAtivo = menusVisiveis.some((m) => m.id === menu) ? menu : (menusVisiveis[0]?.id || "dashboard");

  return (
    <div className="flex min-h-screen w-full bg-slate-50 font-sans text-slate-900" style={{ fontFamily: "system-ui, -apple-system, Segoe UI, Roboto, sans-serif" }}>
      {/* Sidebar */}
      <aside className="sticky top-0 hidden h-screen w-60 flex-col border-r p-4 text-slate-300 md:flex" style={{ background: BRAND.ink, borderColor: "rgba(255,255,255,.08)" }}>
        <div className="mb-6 px-1">
          <CredGTLogo size={38} light />
          <div className="mt-1.5 text-[11px] text-slate-400">Gestão de Vendas</div>
        </div>
        <nav className="flex flex-col gap-1">
          {menusVisiveis.map((m) => {
            const active = menuAtivo === m.id;
            return (
              <button key={m.id} onClick={() => setMenu(m.id)}
                className="flex items-center gap-2.5 rounded-lg px-3 py-2 text-sm transition"
                style={active ? { background: BRAND.blue, color: "#fff" } : { color: "#cbd5e1" }}
                onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = "rgba(255,255,255,.06)"; }}
                onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = "transparent"; }}>
                <m.icon size={17} /> {m.label}
              </button>
            );
          })}
        </nav>
        <div className="mt-auto space-y-2">
          <div className="rounded-lg p-3 text-[11px] text-slate-400" style={{ background: "rgba(255,255,255,.05)" }}>
            <div className="flex items-center gap-1.5 text-slate-200"><Database size={12} /> Funil unificado por CPF</div>
            <p className="mt-1 leading-relaxed">iBridge → Auditoria → Repasse. Dados salvos entre sessões.</p>
          </div>
          <div className="flex items-center justify-between rounded-lg px-3 py-2" style={{ background: "rgba(255,255,255,.05)" }}>
            <div className="min-w-0">
              <div className="truncate text-xs font-semibold text-white">{sessao.nome}</div>
              <div className="text-[10px] uppercase tracking-wide text-slate-400">{sessao.papel}</div>
            </div>
            <button onClick={logout} title="Sair" className="grid h-8 w-8 place-items-center rounded-lg text-slate-300 hover:bg-white/10"><LogOut size={15} /></button>
          </div>
        </div>
      </aside>

      {/* Conteúdo */}
      <main className="flex-1 overflow-x-hidden">
        {/* Top bar mobile */}
        <div className="flex items-center justify-between gap-2 border-b border-slate-200 bg-white px-3 py-2 md:hidden">
          <CredGTLogo size={26} />
          <button onClick={logout} className="flex items-center gap-1 rounded-lg px-2 py-1 text-xs text-slate-500"><LogOut size={13} /> Sair</button>
        </div>
        <div className="flex items-center gap-2 overflow-x-auto border-b border-slate-200 bg-white p-2 md:hidden">
          {menusVisiveis.map((m) => (
            <button key={m.id} onClick={() => setMenu(m.id)}
              className="flex items-center gap-1.5 whitespace-nowrap rounded-lg px-3 py-1.5 text-xs"
              style={menuAtivo === m.id ? { background: BRAND.blue, color: "#fff" } : { color: "#475569" }}>
              <m.icon size={14} /> {m.label}
            </button>
          ))}
        </div>

        <div className="mx-auto max-w-7xl p-4 md:p-6">
          {menuAtivo === "dashboard" && <DashboardView model={model} planoValor={planoValor} comissaoPct={comissaoPct} setConfig={updateConfig} temDados={temDados} go={setMenu} />}
          {menuAtivo === "ibridge" && <IbridgeView model={model} ibridge={ibridge} onUpload={(f) => handleUpload(f, "ibridge")} onClear={() => clearKind("ibridge")} loading={loading === "ibridge"} />}
          {menuAtivo === "auditadas" && <AuditadasView model={model} auditoria={auditoria} onUpload={(f) => handleUpload(f, "auditoria")} onClear={() => clearKind("auditoria")} loading={loading === "auditoria"} />}
          {menuAtivo === "creditadas" && <CreditadasView model={model} repasses={repasses} lerQuinzena={lerQuinzena} onAdd={addQuinzena} onRemove={removeQuinzena} onClear={() => clearKind("repasse")} sessao={sessao} flash={flash} />}
          {menuAtivo === "projecao" && <ProjecaoView model={model} planoValor={planoValor} comissaoPct={comissaoPct} campanhas={campanhas} metaMensal={metaMensal} setConfig={updateConfig} />}
          {menuAtivo === "campanhas" && <CampanhasView campanhas={campanhas} setCampanhas={persistCampanhas} planoValor={planoValor} comissaoPct={comissaoPct} setConfig={updateConfig} sessao={sessao} flash={flash} />}
          {menuAtivo === "relatorios" && <RelatoriosView model={model} repasses={repasses} />}
          {menuAtivo === "usuarios" && <UsuariosView users={users} setUsers={persistUsers} sessao={sessao} flash={flash} />}
        </div>
      </main>

      {/* Toast */}
      {toast && (
        <div className={`fixed bottom-5 right-5 z-50 flex max-w-sm items-start gap-2 rounded-xl px-4 py-3 text-sm text-white shadow-lg ${toast.ok ? "bg-slate-900" : "bg-rose-600"}`}>
          {toast.ok ? <CheckCircle2 size={18} /> : <AlertTriangle size={18} />}
          <span>{toast.msg}</span>
        </div>
      )}
    </div>
  );
}

/* ====================== LOGIN ====================== */
function LoginView({ onLogin, onDefinirSenha }) {
  const [login, setLogin] = useState("");
  const [senha, setSenha] = useState("");
  const [erro, setErro] = useState("");
  const [busy, setBusy] = useState(false);
  const [novoUser, setNovoUser] = useState(null); // primeiro acesso
  const [s1, setS1] = useState(""); const [s2, setS2] = useState("");

  const entrar = async () => {
    setErro(""); setBusy(true);
    const r = await onLogin(login, senha);
    setBusy(false);
    if (r.erro) return setErro(r.erro);
    if (r.primeiroAcesso) { setNovoUser(r.primeiroAcesso); setS1(""); setS2(""); }
  };
  const criarSenha = async () => {
    setErro("");
    if (s1 !== s2) return setErro("As senhas não coincidem.");
    setBusy(true);
    const r = await onDefinirSenha(novoUser.id, s1);
    setBusy(false);
    if (r.erro) return setErro(r.erro);
  };

  return (
    <div className="grid min-h-screen place-items-center p-4" style={{ background: `linear-gradient(135deg, ${BRAND.ink} 0%, ${BRAND.blueDeep} 100%)` }}>
      <div className="w-full max-w-sm rounded-2xl bg-white p-7 shadow-2xl">
        <div className="mb-6 flex flex-col items-center text-center">
          <CredGTLogo size={64} />
          <p className="mt-3 text-sm text-slate-500">Gestão de Vendas</p>
        </div>

        {!novoUser ? (
          <div className="space-y-3">
            <div>
              <label className="mb-1 block text-xs font-medium text-slate-600">Usuário</label>
              <input value={login} onChange={(e) => setLogin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && entrar()}
                className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-400" placeholder="seu.usuario" autoFocus />
            </div>
            <div>
              <label className="mb-1 block text-xs font-medium text-slate-600">Senha</label>
              <input type="password" value={senha} onChange={(e) => setSenha(e.target.value)} onKeyDown={(e) => e.key === "Enter" && entrar()}
                className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-400" placeholder="••••••" />
            </div>
            {erro && <p className="flex items-center gap-1.5 text-xs text-rose-600"><AlertTriangle size={13} /> {erro}</p>}
            <button onClick={entrar} disabled={busy}
              className="mt-1 flex w-full items-center justify-center gap-2 rounded-lg py-2.5 text-sm font-semibold text-white disabled:opacity-60"
              style={{ background: BRAND.blue }}>
              <Lock size={15} /> {busy ? "Entrando…" : "Entrar"}
            </button>
            <p className="pt-1 text-center text-[11px] text-slate-400">Primeiro acesso? Use a senha inicial <b>123456</b> e crie sua senha de 6 dígitos.</p>
          </div>
        ) : (
          <div className="space-y-3">
            <div className="rounded-lg bg-slate-50 p-3 text-center text-sm text-slate-600">
              Olá, <b>{novoUser.nome.split(" ")[0]}</b>! Crie sua senha de acesso.
            </div>
            <div>
              <label className="mb-1 block text-xs font-medium text-slate-600">Nova senha (6 dígitos)</label>
              <input type="password" inputMode="numeric" maxLength={6} value={s1} onChange={(e) => setS1(e.target.value.replace(/\D/g, ""))}
                className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm tracking-[0.4em] outline-none focus:border-slate-400" placeholder="••••••" autoFocus />
            </div>
            <div>
              <label className="mb-1 block text-xs font-medium text-slate-600">Confirme a senha</label>
              <input type="password" inputMode="numeric" maxLength={6} value={s2} onChange={(e) => setS2(e.target.value.replace(/\D/g, ""))} onKeyDown={(e) => e.key === "Enter" && criarSenha()}
                className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm tracking-[0.4em] outline-none focus:border-slate-400" placeholder="••••••" />
            </div>
            {erro && <p className="flex items-center gap-1.5 text-xs text-rose-600"><AlertTriangle size={13} /> {erro}</p>}
            <button onClick={criarSenha} disabled={busy}
              className="flex w-full items-center justify-center gap-2 rounded-lg py-2.5 text-sm font-semibold text-white disabled:opacity-60" style={{ background: BRAND.blue }}>
              <KeyRound size={15} /> {busy ? "Salvando…" : "Criar senha e entrar"}
            </button>
            <p className="text-center text-[11px] text-slate-400">A senha deve ser numérica, com 6 dígitos, e diferente das demais.</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ====================== USUÁRIOS ====================== */
function UsuariosView({ users, setUsers, sessao, flash }) {
  const isAdmin = sessao.papel === "admin";
  const [edit, setEdit] = useState(null); // user em edição (ou novo)
  const [confirmDel, setConfirmDel] = useState(null);

  const novo = () => setEdit({ id: "u_" + Date.now(), nome: "", email: "", login: "", senha: SENHA_INICIAL, precisaSenha: true, papel: "usuario", menus: menusAll(), _novo: true });
  const salvar = async () => {
    const e = edit;
    if (!e.nome.trim() || !e.login.trim()) return flash("Nome e usuário são obrigatórios.", false);
    const loginNorm = e.login.trim().toLowerCase();
    if (users.some((u) => u.id !== e.id && u.login.toLowerCase() === loginNorm)) return flash("Já existe um usuário com esse login.", false);
    const limpo = { ...e, login: loginNorm }; delete limpo._novo;
    const lista = e._novo ? [...users, limpo] : users.map((u) => u.id === e.id ? limpo : u);
    await setUsers(lista); setEdit(null);
    flash(e._novo ? "Usuário incluído." : "Usuário atualizado.");
  };
  const excluir = async (u) => { await setUsers(users.filter((x) => x.id !== u.id)); setConfirmDel(null); flash("Usuário excluído."); };
  const resetSenha = async (u) => { await setUsers(users.map((x) => x.id === u.id ? { ...x, senha: SENHA_INICIAL, precisaSenha: true } : x)); flash(`Senha de ${u.nome.split(" ")[0]} redefinida para 123456 (1º acesso).`); };

  const countMenus = (u) => MENU_KEYS.filter((k) => u.menus?.[k]).length;

  return (
    <>
      <PageHeader title="Usuários" desc="Controle de acesso ao Cred GT. A senha inicial é 123456 — no 1º acesso o usuário define uma senha numérica de 6 dígitos."
        right={isAdmin && <button onClick={novo} className="flex items-center gap-1.5 rounded-lg px-3 py-2 text-sm font-medium text-white" style={{ background: BRAND.blue }}><Plus size={15} /> Novo usuário</button>} />

      {!isAdmin && <div className="mb-4 rounded-lg border border-amber-200 bg-amber-50 px-4 py-2.5 text-sm text-amber-800">Somente administradores podem incluir, editar ou excluir usuários.</div>}

      <div className="overflow-hidden rounded-xl border border-slate-200 bg-white">
        <table className="w-full text-sm">
          <thead><tr className="border-b border-slate-200 bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-500">
            <th className="px-4 py-2.5">Nome</th><th className="px-4 py-2.5">Usuário</th><th className="px-4 py-2.5">Perfil</th>
            <th className="px-4 py-2.5">Menus</th><th className="px-4 py-2.5">Status</th><th className="px-4 py-2.5 text-right">Ações</th>
          </tr></thead>
          <tbody>
            {users.map((u) => (
              <tr key={u.id} className="border-b border-slate-50 last:border-0">
                <td className="px-4 py-2.5"><div className="font-medium text-slate-800">{u.nome}</div><div className="text-xs text-slate-400">{u.email}</div></td>
                <td className="px-4 py-2.5 text-slate-600">{u.login}</td>
                <td className="px-4 py-2.5"><span className="rounded-full px-2 py-0.5 text-xs font-medium" style={{ background: u.papel === "admin" ? BRAND.mint : "#EEF2F6", color: u.papel === "admin" ? BRAND.blueDeep : "#475569" }}>{u.papel}</span></td>
                <td className="px-4 py-2.5 text-slate-600">{countMenus(u)}/{MENU_KEYS.length}</td>
                <td className="px-4 py-2.5">{u.precisaSenha ? <span className="text-xs text-amber-600">1º acesso pendente</span> : <span className="text-xs text-emerald-600">ativo</span>}</td>
                <td className="px-4 py-2.5">
                  {isAdmin && (
                    <div className="flex items-center justify-end gap-1">
                      <button onClick={() => setEdit({ ...u })} title="Editar" className="grid h-8 w-8 place-items-center rounded-lg text-slate-500 hover:bg-slate-100"><Pencil size={14} /></button>
                      <button onClick={() => resetSenha(u)} title="Redefinir senha" className="grid h-8 w-8 place-items-center rounded-lg text-slate-500 hover:bg-slate-100"><KeyRound size={14} /></button>
                      {u.id !== sessao.id && <button onClick={() => setConfirmDel(u)} title="Excluir" className="grid h-8 w-8 place-items-center rounded-lg text-rose-500 hover:bg-rose-50"><Trash2 size={14} /></button>}
                    </div>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Modal de edição */}
      {edit && (
        <div className="fixed inset-0 z-50 grid place-items-center bg-black/40 p-4" onClick={() => setEdit(null)}>
          <div className="w-full max-w-lg rounded-2xl bg-white p-5 shadow-xl" onClick={(e) => e.stopPropagation()}>
            <div className="mb-4 flex items-center justify-between">
              <h3 className="text-base font-semibold text-slate-800">{edit._novo ? "Novo usuário" : "Editar usuário"}</h3>
              <button onClick={() => setEdit(null)} className="text-slate-400 hover:text-slate-600"><X size={18} /></button>
            </div>
            <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
              <Field label="Nome completo"><input value={edit.nome} onChange={(e) => setEdit({ ...edit, nome: e.target.value })} className="inp" /></Field>
              <Field label="E-mail"><input value={edit.email} onChange={(e) => setEdit({ ...edit, email: e.target.value })} className="inp" /></Field>
              <Field label="Usuário (login)"><input value={edit.login} onChange={(e) => setEdit({ ...edit, login: e.target.value })} className="inp" /></Field>
              <Field label="Perfil">
                <select value={edit.papel} onChange={(e) => setEdit({ ...edit, papel: e.target.value })} className="inp">
                  <option value="admin">admin</option><option value="usuario">usuario</option>
                </select>
              </Field>
            </div>
            <div className="mt-4">
              <div className="mb-1.5 flex items-center justify-between">
                <label className="text-xs font-medium text-slate-600">Acesso aos menus</label>
                <div className="flex gap-2 text-[11px]">
                  <button onClick={() => setEdit({ ...edit, menus: menusAll() })} className="text-slate-500 hover:underline">Marcar todos</button>
                  <button onClick={() => setEdit({ ...edit, menus: menusFrom([]) })} className="text-slate-500 hover:underline">Limpar</button>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-1.5 rounded-lg border border-slate-200 p-3 sm:grid-cols-3">
                {MENU_DEFS.map(([k, label]) => (
                  <label key={k} className="flex items-center gap-2 text-sm text-slate-600">
                    <input type="checkbox" checked={!!edit.menus?.[k]} onChange={(e) => setEdit({ ...edit, menus: { ...edit.menus, [k]: e.target.checked } })} />
                    {label}
                  </label>
                ))}
              </div>
            </div>
            <div className="mt-3 rounded-lg bg-slate-50 px-3 py-2 text-[11px] text-slate-500">
              {edit._novo ? "O usuário entrará com a senha inicial 123456 e definirá a própria senha no 1º acesso." : "Para zerar a senha, use o botão da chave na listagem (volta para 123456)."}
            </div>
            <div className="mt-4 flex justify-end gap-2">
              <button onClick={() => setEdit(null)} className="rounded-lg px-4 py-2 text-sm text-slate-600 hover:bg-slate-100">Cancelar</button>
              <button onClick={salvar} className="flex items-center gap-1.5 rounded-lg px-4 py-2 text-sm font-semibold text-white" style={{ background: BRAND.blue }}><Check size={15} /> Salvar</button>
            </div>
          </div>
        </div>
      )}

      {/* Confirmação de exclusão */}
      {confirmDel && (
        <div className="fixed inset-0 z-50 grid place-items-center bg-black/40 p-4" onClick={() => setConfirmDel(null)}>
          <div className="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-base font-semibold text-slate-800">Excluir usuário</h3>
            <p className="mt-2 text-sm text-slate-600">Remover <b>{confirmDel.nome}</b>? Essa ação não pode ser desfeita.</p>
            <div className="mt-4 flex justify-end gap-2">
              <button onClick={() => setConfirmDel(null)} className="rounded-lg px-4 py-2 text-sm text-slate-600 hover:bg-slate-100">Cancelar</button>
              <button onClick={() => excluir(confirmDel)} className="rounded-lg bg-rose-600 px-4 py-2 text-sm font-semibold text-white">Excluir</button>
            </div>
          </div>
        </div>
      )}
      <style>{`.inp{width:100%;border:1px solid #cbd5e1;border-radius:.5rem;padding:.5rem .75rem;font-size:.875rem;outline:none}.inp:focus{border-color:#94a3b8}`}</style>
    </>
  );
}
function Field({ label, children }) {
  return <div><label className="mb-1 block text-xs font-medium text-slate-600">{label}</label>{children}</div>;
}

/* ====================== CAMPANHAS ====================== */
function CampanhasView({ campanhas, setCampanhas, planoValor, comissaoPct, setConfig, sessao, flash }) {

  const [edit, setEdit] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [vProd, setVProd] = useState(planoValor);
  const [vPad, setVPad] = useState(Math.round(comissaoPct * 100));

  const hoje = new Date().toISOString().slice(0, 10);
  const novo = () => setEdit({ id: "camp_" + Date.now(), nome: "", ativa: true, inicio: hoje, fim: "", pctPrimeira: 0.50, pctRecorrente: 0.30, vantagem: "", _novo: true });
  const salvar = async () => {
    const e = edit;
    if (!e.nome.trim()) return flash("Dê um nome à campanha.", false);
    const limpo = { ...e }; delete limpo._novo;
    const lista = e._novo ? [...campanhas, limpo] : campanhas.map((c) => c.id === e.id ? limpo : c);
    await setCampanhas(lista); setEdit(null);
    flash(e._novo ? "Campanha criada." : "Campanha atualizada.");
  };
  const excluir = async (c) => { await setCampanhas(campanhas.filter((x) => x.id !== c.id)); setConfirmDel(null); flash("Campanha excluída."); };
  const toggleAtiva = async (c) => { await setCampanhas(campanhas.map((x) => x.id === c.id ? { ...x, ativa: !x.ativa } : x)); };
  const salvarProduto = async () => { await setConfig({ planoValor: vProd, comissaoPct: (vPad || 0) / 100 }); flash("Valor do produto e comissão padrão atualizados."); };

  const pct = (n) => `${Math.round((n || 0) * 100)}%`;
  const cobre = (c) => c.ativa && (!c.inicio || hoje >= c.inicio) && (!c.fim || hoje <= c.fim);

  return (
    <>
      <PageHeader title="Campanhas" desc="Cadastre o valor do produto e as campanhas do parceiro. As regras de comissão por período são aplicadas automaticamente nas vendas creditadas." />

      {/* Valor do produto + comissão padrão */}
      <div className="mb-5 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <div className="flex items-center gap-2 text-sm font-semibold text-slate-800"><Coins size={16} style={{ color: BRAND.blue }} /> Valor do produto e comissão padrão</div>
        <p className="mt-1 text-xs text-slate-500">Se houver reajuste do plano, altere aqui — o sistema recalcula tudo, sem precisar reprogramar.</p>
        <div className="mt-4 flex flex-wrap items-end gap-4">
          <div>
            <label className="mb-1 block text-xs font-medium text-slate-600">Valor do produto (R$)</label>
            <input type="number" step="0.01" value={vProd} onChange={(e) => setVProd(parseFloat(e.target.value) || 0)} disabled={!isAdmin}
              className="w-36 rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-400 disabled:bg-slate-50" />
          </div>
          <div>
            <label className="mb-1 block text-xs font-medium text-slate-600">Comissão padrão (%)</label>
            <input type="number" step="1" value={vPad} onChange={(e) => setVPad(parseFloat(e.target.value) || 0)} disabled={!isAdmin}
              className="w-28 rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-400 disabled:bg-slate-50" />
            <p className="mt-1 text-[11px] text-slate-400">Vale fora de campanha</p>
          </div>
          <div className="rounded-lg bg-slate-50 px-3 py-2 text-xs text-slate-500">
            Comissão padrão por venda: <b className="text-slate-700">{fmtBRL((vProd || 0) * (vPad || 0) / 100)}</b>
          </div>
          {isAdmin && <button onClick={salvarProduto} className="ml-auto flex items-center gap-1.5 rounded-lg px-4 py-2 text-sm font-semibold text-white" style={{ background: BRAND.blue }}><Check size={15} /> Salvar</button>}
        </div>
      </div>

      <div className="mb-4 flex items-center justify-between">
        <h2 className="text-base font-semibold text-slate-800">Campanhas cadastradas</h2>
        {isAdmin && <button onClick={novo} className="flex items-center gap-1.5 rounded-lg px-3 py-2 text-sm font-medium text-white" style={{ background: BRAND.blue }}><Plus size={15} /> Nova campanha</button>}
      </div>
      {campanhas.length === 0 ? (
        <EmptyState icon={Megaphone} title="Nenhuma campanha cadastrada" desc="Crie uma campanha definindo período e as % de comissão da 1ª venda e da recorrência." />
      ) : (
        <div className="grid gap-4 md:grid-cols-2">
          {campanhas.map((c) => (
            <div key={c.id} className="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
              <div className="flex items-start justify-between gap-2">
                <div>
                  <div className="flex items-center gap-2">
                    <span className="grid h-9 w-9 place-items-center rounded-lg" style={{ background: BRAND.mint, color: BRAND.blueDeep }}><Megaphone size={17} /></span>
                    <div>
                      <div className="font-semibold text-slate-800">{c.nome}</div>
                      <div className="text-xs text-slate-500">{c.inicio ? brFromISO(c.inicio) : "—"} → {c.fim ? brFromISO(c.fim) : "sem fim"}</div>
                    </div>
                  </div>
                </div>
                <span className="rounded-full px-2 py-0.5 text-[11px] font-medium" style={cobre(c) ? { background: "#DCFCE7", color: "#15803D" } : c.ativa ? { background: "#FEF3C7", color: "#92400E" } : { background: "#F1F5F9", color: "#64748B" }}>
                  {cobre(c) ? "Vigente" : c.ativa ? "Ativa (fora do período)" : "Inativa"}
                </span>
              </div>

              <div className="mt-4 grid grid-cols-2 gap-2">
                <div className="rounded-lg p-3" style={{ background: "#EAF3FA" }}>
                  <div className="text-[11px] font-medium uppercase tracking-wide" style={{ color: BRAND.blueDeep }}>1ª venda creditada</div>
                  <div className="mt-0.5 text-lg font-bold" style={{ color: BRAND.blueDeep }}>{pct(c.pctPrimeira)}</div>
                  <div className="text-[11px] text-slate-500">{fmtBRL(planoValor * c.pctPrimeira)} por venda</div>
                </div>
                <div className="rounded-lg bg-violet-50 p-3">
                  <div className="text-[11px] font-medium uppercase tracking-wide text-violet-700">Recorrência (2ª+)</div>
                  <div className="mt-0.5 text-lg font-bold text-violet-700">{pct(c.pctRecorrente)}</div>
                  <div className="text-[11px] text-slate-500">{fmtBRL(planoValor * c.pctRecorrente)} por venda</div>
                </div>
              </div>

              {c.vantagem && <p className="mt-3 rounded-lg bg-slate-50 p-3 text-xs leading-relaxed text-slate-600">{c.vantagem}</p>}

              {isAdmin && (
                <div className="mt-4 flex items-center gap-2 border-t border-slate-100 pt-3">
                  <button onClick={() => setEdit({ ...c })} className="flex items-center gap-1 rounded-lg px-2.5 py-1.5 text-xs text-slate-600 hover:bg-slate-100"><Pencil size={13} /> Editar</button>
                  <button onClick={() => toggleAtiva(c)} className="flex items-center gap-1 rounded-lg px-2.5 py-1.5 text-xs text-slate-600 hover:bg-slate-100">{c.ativa ? "Desativar" : "Ativar"}</button>
                  <button onClick={() => setConfirmDel(c)} className="ml-auto flex items-center gap-1 rounded-lg px-2.5 py-1.5 text-xs text-rose-600 hover:bg-rose-50"><Trash2 size={13} /> Excluir</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Modal edição de campanha */}
      {edit && (
        <div className="fixed inset-0 z-50 grid place-items-center bg-black/40 p-4" onClick={() => setEdit(null)}>
          <div className="w-full max-w-lg rounded-2xl bg-white p-5 shadow-xl" onClick={(e) => e.stopPropagation()}>

              </Field>

            </div>
          </div>
        </div>
      )}

      {confirmDel && (
        <div className="fixed inset-0 z-50 grid place-items-center bg-black/40 p-4" onClick={() => setConfirmDel(null)}>
          <div className="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl" onClick={(e) => e.stopPropagation()}>

            </div>
          </div>
        </div>
      )}
      <style>{`.inp{width:100%;border:1px solid #cbd5e1;border-radius:.5rem;padding:.5rem .75rem;font-size:.875rem;outline:none}.inp:focus{border-color:#94a3b8}`}</style>
    </>
  );
}
